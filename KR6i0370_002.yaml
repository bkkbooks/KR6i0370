body:
  text: 疏四正解經文於中復二初釋題目鈔疏科分二初翻譯時主又二初通敘三譯疏述曰此經總有三譯一晉武帝時剎法師翻云盂蘭盆經鈔舊本云剎法師蓋傳寫之誤藏本云西晉三藏竺法護譯梵語曇摩羅剎此云法護今略云剎也疏二惠帝時法炬法師譯云灌臘經應此文云具飯百味五果汲灌盆器香油錠燭等故三舊本別録又有一師翻為報恩經約所行之行而立名故二正指此本疏今所釋者即初譯也二正釋經題二初能說之佛疏義淨三藏云頒自我口暢之彼心以教合機故稱佛說二所說之法二初釋所詮三字復二初別明三字疏盂蘭是西域之語此云倒懸盆乃東夏之音仍為救器若隨方俗應曰救倒懸盆鈔盆乃東夏之音即今大宋翻經者言舊云盆佐那略言盆也新云門佐羅亦云門佐曩華言救器如前已釋若言骨拏迦翻為盆非經之本意也二總顯行相疏斯由尊者之親魂沈暗道載饑且渴命似倒懸縱聖子之威靈無以拯其塗炭鈔暗道之言雖通於三塗今明鬼趣載則也且兼也皆語詞塗炭者鬼趣危苦如陷泥墜火無救之者疏佛令盆羅百味式貢三尊仰大衆之恩光救倒懸之窘急即從此義以立經名二釋能詮經字二初隨文釋義疏經者正明為線義曰契經線能貫華經能持緯謂所詮之義似緯似華能持之文能持能貫今順此方典誥是以目之為經借義助名仍加契字鈔經者法苑云西域呼汲索衣線席經聖教皆名素怛纜此有六義藏教攝三謂線經聖教聖教謂律與論以是經中一分義故皆名素怛纜天親慈恩各四義釋如前已録佛地二義雜心五義由此多義故但言經不言線等疏棄通經而取局線違自引論寐之胡甚二指同餘論疏此釋符佛地論二義中貫穿之義如上已釋雜心論五義中結鬘之義也餘四者涌泉出生繩墨顯示也鈔五義者一出生義令生出苦故二涌泉義義味無盡故三顯示義明因果相故四繩墨義去邪取直故五結鬘義如線貫花集諸義故二釋經本文二初科判經文復二初總科一經二初科經三分疏次解本文分三一序分二正宗分三流通分二指古規模疏以三分之興彌天高判冥符西域今古同遵二別科序分二初信起科復二初釋證信意疏初序分中諸經多有二序一證信序謂如是之法我從佛聞標記說時說處分明大衆同聞非謬以為證據令總信受經無豐約非信不傳由是經初必須證信故智度論云說時方人令生信故二釋發起意疏二發起序發明生起正宗之法如淨名寶蓋法華毫光之類鈔說維摩經時寶積等五百長者各獻一蓋佛受得已合成一蓋略有四義一由佛神力合多為一欲令施者生不思議想故二合蓋現土發起施者修淨土業無上心故三明諸法無定或多為一多不定多或一為多一不定一悟實相者未曾一多四表諸長者現在同悟無生未來同成佛故廣如彼疏說法華時佛於眉間放白毫相光疏云眉者面首之媚表所說勝一乘宗媚間謂兩中表說中道白為衆色之本顯此法是三乘之源放光破暗警覺羣機也二通別科疏然證信亦云通敘諸經皆同故亦云經後序佛說法時而未有故發起亦云別序諸經各別故亦云經前序佛先自發起方說正宗故二隨科解釋疏初證信序者聞如是一時佛在舍衛國祇樹給孤獨園鈔疏科二初說佛因由復二初總敘問答疏述曰則佛臨滅度時阿難請問四事佛令置此言也鈔大術經說佛受波旬請已將入涅槃阿難悲咽優波離等教示阿難請問佛滅度後所為之事謂問四事云云二別敘四事疏所問四事佛一一答謂一依四念處謂觀身不淨觀受是苦觀心無常觀法無我二以戒為師三默擯惡性比丘鈔戒為師者訓匠軌範名師師有二種謂人與法如來在日以佛為師佛滅度後以法為師軌則儀範依戒法故別解脫戒為汝等師惡性比丘梵壇治之梵淨也壇法也以清淨法默擯治之作一羯磨七衆不得共語故云梵壇治之疏四一切經初皆云如是我聞一時佛在某處與某衆若干人俱二釋經文義二初顯經闕異復二初顯經所闕又二初敘述餘經疏諸經多具六種成就文或闕略義必具之謂一信二聞三時四主五處六衆六緣不具教則不興必須具六故云成就鈔依佛地論通敘有五一如是我聞為信成就總顯已聞令生信故二一時之言為時成就三佛為教主成就四在舍衛國等為處所成就五與某等衆若干人俱為衆成就此略第五文具應云佛在舍衛國祇樹給孤獨園與大目犍連四輩弟子俱等也然今疏主依般若燈論作六種成就故云如是者信成就也文窄旨隱行相難知指陳何法令生信乎所宗既殊可從佛地二指此經闕疏今經闕於列衆也二顯經所異二初指陳標異疏又聞成就為初異餘經者各是譯人之意二釋其所以三初餘經四字正倒疏謂或云如是之法我從佛聞或云我於佛邊聞如是法皆是指法之詞也鈔或云如是我聞或云我聞如是佛地論云應知說此如是我聞意避增減異分過失謂如是法我從佛聞皆離增減異分過失乃至云是故聞者應正聞已如理思惟當勤修學真諦三藏依微細律明阿難升座集法藏時身如真佛具諸相好下座之時還復本形集法藏傳亦云衆生三疑一疑佛大悲從涅槃起更說妙法二疑更有佛從他方來住此說法三疑阿難轉身成佛為衆說法為除彼疑指如是法我昔侍佛親所曾聞故云如是我聞二此經不言我意疏不云我者意彰聖人皆證無我理故三餘經言我之意疏餘經有者即阿難自指五蘊假者不同情計之我亦無過也二隨文正釋五初釋聞如是又二初釋聞字疏聞謂耳根發識聽彼外聲鈔佛地論云聞謂耳根發識聽受所說佛教音聲若但聞聲可唯在耳若緣名句便在意中瑜伽亦云聞謂比量廢別耳意總言聞也二釋如是疏次云如是者信成就也夫信者言是事如是不信者言是事不如是故肇公云信順之詞也鈔法華疏云如是者感應之端如以順機受名是以無非立稱衆生以無非為感如來以順機為應傳法聖者欲顯名教出於感應故建言如是二顯一時言二初正釋一時復二初二義正釋疏一時者師資合會說聽究竟總名一時簡異餘時也鈔一時者佛地論中二義釋之一說者聽者剎那相續說聽究竟法席事畢總名一時二說者聽者共相會遇無前無後說聽同時故名一時配疏應云說聽究竟總名一時師資合會名一時也二以義釋成疏謂如來說經時有無量不能別舉一言略周故但云一諸方時分延促不定故總言一時鈔即以疏云年月春秋等無量時也若一一別舉則成繁雜若止定一時則不能普應諸方凡聖利鈍機宜為欲普應一切機故總言一時意取說聽事訖名一時也其中具含長短等義利根時短悟解速故鈍根時長悟解遲故若舉年月等不應利根若舉須臾等不應鈍根若舉四時十二時等不應四洲諸天機故由此但總言一時也諸方下釋成次上無量時義意說四洲諸方時分不定凡聖利鈍延促不定也二會釋例難二初牒前例難疏然諸經中不指定時指定處者二會釋文意二初指慈恩解疏有解招難故不用之鈔有解招難如玄贊疏云問處中有淨穢隨機定說處時中凡聖殊何容不定說答說處標淨穢淨穢可定知標舍衛等十地菩薩謂是淨土聲聞等衆謂是穢土一處見異淨穢雙彰也說時有短長凡聖不可準一會機宜有利有鈍長時短時如何定準一時之言具含長短利根謂短悟解速故鈍根謂長悟解遲故故處可定說而時但總言一時也二疏主自解疏今詳其意以處則不過十六國中遊化住止之處而有其數易為標指鈔十六國者仁王經云毗舍離國憍薩羅國乃至瞻波國今疏云以處則不過十六國中者雖依智度論彼約遊化境界而言其義局也然法王自在天上說法龍宮集會於一切處普化六趣非唯十六國中招難之言復歸疏主耳疏時則年月春秋寒熱晝夜寅卯須臾等時變異迅速積數無量不可說録難為標指故三彰說教主疏佛者梵語佛陀此云覺者謂覺了真妄性相之者也覺有三義一自覺我空簡異凡夫二覺他法空簡異二乘三覺滿俱空合於本覺名究竟覺或名大覺妙覺簡異菩薩鈔佛陀翻為覺者無漏五蘊假者有主宰義故名者也覺體是慧覺察斷障覺了二諦謂本智覺了勝義真性後得覺了世俗妄相此有三覺簡諸凡聖一者自覺由證我空無為理故自覺斷障簡異凡夫二者覺他由證法空無為理故覺他利物簡異二乘三者覺滿由證人法俱空理故至究竟位名為覺滿依起信論以無為理名為本覺以有為智名為始覺由以始覺圓合本覺名究竟覺方廣無際亦名大覺勝無比等亦名妙覺簡異菩薩彼雖二覺然在因位未圓滿故唯有如來具足三覺獨名為佛四辨所化處二初釋二處意復二初真諦記釋疏在舍衛等者處成就也鈔上生疏云梵語室利羅筏悉底舊云舍衛國訛略也此云豐德城在中印度憍薩羅國之都城名也為簡南憍薩羅故以都城為國之稱言豐德者一足財物二妙欲境三饒多聞四豐解脫國豐四德故以為名所言在者遊化居止之義遊化國中居止園林故名為在疏真諦記云住處有二一境界處遊歷之境謂化在俗之流二依止處謂統出家之衆初即舍衛後即祇園二婆沙釋論疏婆沙論云舉舍衛者令遠人知國是總名舉祇園者令近人知園是別故二釋二處文二初釋遊化處疏舍衛此云聞物謂具足財寶之物多聞解脫之人遠聞諸國故義淨三藏譯金剛經云名稱大城二釋居止處二初別釋園樹名義分三初園樹名義又二初釋園樹名疏祇樹等者即祇陀太子所施之樹給孤長者所買之園二釋施主名疏祇陀此云戰勝波斯匿王太子也生時王與外國戰勝因以為名鈔言祇陀者訛也正云誓多此翻為勝是鉢剌犀那恃特王舊云波斯匿王訛也此云勝軍王彼王之太子也太子生時鄰國怨至戰而得勝故為名也疏給孤獨者是臣之號本名須達多此云善施謂給孤獨即是善施又常行施故名善施鄉人美之號給孤獨孤者少而無父也獨者老而無子也鈔梵語蘇達多舊言須達訛略也此云善施是勝軍王之大臣也二園樹先後疏然園是須達所買樹是祇陀所施園總樹別先合標園今以禮別尊卑故樹先園後三因顯伽藍此方名寺疏西國呼寺為僧伽藍摩此云衆園以佛教東流初至中國止鴻臚寺賓異域僧僧既漸多散置別館存其本號皆曰寺焉鈔衆園者是出家衆所住園故後漢第二主孝明皇帝時摩騰竺法蘭初到洛陽權住鴻臚寺別創堂殿安之二僧移入新居不忘其本故標寺號又以白馬䭾經至此而死建塔葬於寺中因名白馬寺僧史略云至後魏太武帝始光元年創立伽藍名為招提隋煬帝大業年中改為道場至唐復為寺也二買園施樹因由二初敘致因由疏其買園施樹者涅槃經說須達長者為兒娉婦詣王舍城因見佛發心請入舍衛說法佛令舍利弗隨歸先揀住處擇得祇陀太子之園長者問買太子戲云側布黃金滿即賣之長者便欲交付太子云是戲言共請斷事之人斷之被斷令依先語長者載金側布唯少一隅太子見其不惜財寶知佛殊勝遂施所餘之地置立門屋施園中樹以為林蔭鈔被斷等者涅槃等說淨居天子化作斷事之者斷與須達於是布金滿地高敷五寸壁方十里少五百步未滿十里一庫金盡更欲取金太子知意自思念言彼尚傾庫修諸福慧我何所乏而無修建語須達言地雖汝主林樹屬我共助成功具陳供佛餘未遍者五百步地不須復金請以見與我自為佛建立門樓常使如來經遊出入須達許之是時須達七日成立大房足三百口禪坊淨處六十三所冬屋夏房厨坊浴室洗腳之處大小圊廁無不具足所設已訖即執香爐遙請如來佛時懸知是長者心即與大衆至舍衛城祇陀園林須達精舍即住其中佛告阿難園地須達所買林樹祇陀所施二人同心共崇勝福自今已後應謂此地為祇樹給孤獨園如佛世尊住王舍城耆闍崛山說法華經慈恩釋云城勝餘城無麗物而不出法勝餘法無嘉德而不具山勝餘山為好鳥之所棲止法勝餘法為上人之所遊心故知玄妙喻通教理或教妙如城含妙理故理高如山出二乘故有所表矣此在舍衛國國豐四德表此經中孝順設供苦報恩四義勝故樹勝餘樹為釋子之林蔭經勝餘經為孝子之依稟園勝餘園布金買而施佛利生法勝餘法設勝會而奉僧拔苦祇陀太子依父王命修仁蘊德表佛弟子依法王教修慈行孝須達長者濟近遠之孤貧行孝順者救父母之幽苦佛所施為事不虗設皆有表矣二結歸名號疏二人共成精舍請佛居之故云祇樹等也五議所化衆疏闕衆成就者但文略也如無常經等然有其時必具徒衆故經末云四輩弟子歡喜奉行二發起序二初釋其定趣疏二發起序者此經既以孝順拔苦為宗故託救母之緣而為發起二科經解釋疏文分為六第一目連道滿第二知恩欲酬第三攀慕遍尋第四得見所在第五慟哭往救第六惡習現前今初大目犍連始得六通鈔疏科二初目連名氏又二初顯姓釋名疏述曰此人姓大目犍連唐言採菽氏彼國上古有仙常食菉豆尊者是彼之種族也名尼拘律陀即樹名也尊者二親因祭此樹神而生尊者故名此也鈔法華疏云梵語摩訶沒特伽羅大目犍連訛也此云大採菽氏上古有仙居山寂處常採菉豆而食因以為姓尊者之母是彼種族取母氏姓而合其名得大神通簡餘卑姓故名大採菽氏從父本名俱利迦亦云拘麗多舊名俱律陀訛也二呼姓所以疏是王舍城中輔相之子時人貴其種所以稱其氏鈔上生疏云目連是婆羅門種與舍利弗少為親友同厭俗塵各求出離互相謂言若先嘗甘露必同其味後舍利弗王舍城中逢於馬勝為說偈言諸法從緣生緣謝法還滅我師釋迦文常作如是說舍利弗聞已即證初果復為目連說所聞偈目連聞已復證初果遂與徒衆二百五十人俱來到佛所世尊遙見指告衆曰彼來之者我弟子中神足第一佛呼善來苾芻淨修梵行得離苦際聞是語已鬚髮自落俗裳自變戒品清淨經七日已證阿羅漢果神通第一按十二由經云佛成道後五年度目犍連也二始得六通二初總釋經意復二初正釋疏始得六通者始即是初初得聖道便度二親本因親而修道故也二釋妨疏道雖無異本願各殊故諸聖者不必皆爾二別釋六通二初釋別名分六初神境通疏六通者一神境通智證神境故亦名如意通身如其意欲往即到故鈔神謂神變靈妙之德境謂境界雨花等事神所變境名為神境境體即神名為神境通者無擁滯義變現神境之通名神境通二天眼通三天耳通二科合疏二天眼通三天耳通謂能見能聞若近若遠障內障外色聲等故鈔天眼通者清淨色根照境發識名之為眼依天修得名為天眼有人趣身引得天眼眼屬色界亦名天眼謂由天眼引發通故名天眼通天耳通準此四宿命通疏四宿命通能知宿世本生本事故鈔宿命通亦名宿住通宿世所住壽命本生族望本所造作善惡事業如是一切皆能知故五他心通疏五他心通謂於定散漏無漏心一切能知故鈔他心通者他人心品若定若散有漏無漏善惡無記皆能知故六漏盡通疏六漏盡通謂身中漏盡而能知故鈔漏盡通者漏盡身中得此通故又知自他漏染盡故又無為理漏盡顯故得漏盡名漏盡之通名漏盡通六通剋性皆智為體三乘聖人所得神通勝劣有異如別處說二釋通義疏六皆無擁故總名通第二知恩欲酬欲度父母報乳哺之恩鈔疏科二初子行孝順報恩之相分三初正顯報恩孝順之相又二初總釋經文疏述曰度謂度脫然報恩兩字但是通標虗位度脫正是其報乳謂母乳哺是嚼哺乳哺如濟食是恩之實事度脫如扶輪是報之實事二別釋三事二初列三事疏然父母有遠近恩有輕重報有分全二隨列釋三初父母遠近分二初略指遠近疏遠者七世乃至多世近者即生此身二廣明遠世二初七世父母復二初依外典說疏七世者外教所宗人以形質為本傳體相續以父祖已上為七世故偏尊於父鈔偏尊於父者以說此身是父遺體皆從父姓矣二依內教說二初約理正陳疏佛教所宗人以靈識為本四大形質為靈識所依世世生生皆有父母生養此身已去乃至七生所生父母為七世也二會經文意疏然寄託之處唯在母胎生來乳哺懷抱亦多是母故偏重母是以經中但云報乳哺之恩也二多世父母疏乃至多世者於中偏取歸依佛已來所有生身父母能生我身修道器故諸佛成道之時多生父母皆相會遇聞法獲益鈔此指其時分以分輕重故說已前已後若無其身不歸依佛由其父母生於身器方歸依佛故恩重也二恩有輕重疏恩有輕重者此生父母最重餘漸輕也三報有分全二初雙標分全疏報有分全者侍養一生為分度脫多生為全二別釋分全疏故經云左肩擔父右肩擔母遍行大地亦不能報恩故知此生所報為分設同孟宗董黯董永之類亦為分也今經云欲度父母者意令得道明其全也二古聖恩深難報之相二初直顯負恩疏若總不報便是不孝罪人況加逆事二舉輕況重疏且泛論一切人恩華嚴經云不知恩者多遭橫死觀佛相海經云有恩不報是阿鼻因諸恩尚然況於父母父母之恩無可校量三父母恩深難報之相二初引詩顯示疏故詩云蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞乃至無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極第十三周幽王好征伐人民勞苦孝子不得終養耳鈔蓼音六蓼蓼者長大貌也匪非也伊唯也勞苦所役心昧目昏見長大者莪草謂非莪草而唯蒿草也哀哀者苦恨之貌也哀嗟苦恨恨己不得終養於父母也父母生我勤劬勞苦不得終於侍養所以自恨銜者含也恤憂也靡無也無父依怙無母倚恃我出含憂我入無至父兮生我母兮鞠養拊拍憐我畜起悅我長我知見覆育我身顧者旋視也而旋視我反復音覆視我父母出入腹厚於我我今欲報如是之德恩如昊天罔無窮極而難報之二三藏指陳疏故三藏云父母義高天地恩深巨海是以係仰顧腹之恩思答劬勞之德鈔係仰者係心仰念顧視腹厚之恩也二父母恩重子逆之相二初引經顯示分三初父母恩重復二初略示恩深又二初養育劬勞疏父母恩重經云父母懷抱含笑未語和和弄聲飢時須食非母不哺渴時須飲非母不乳云云十指甲中食子不淨云云鈔恩重經云佛告大衆人生在世父母為親非父不生非母不育是以寄託母胎十月懷身歲滿月充子母俱險生墮草上父母養育臥在欄車父母懷抱含笑未語和和弄聲饑時須食非母不哺渴時須飲非母不乳子若饑時咽苦吐甘推乾就濕非父不親非母不養慈母養兒去離欄車十指甲中食子不淨子飲母乳八斛四斗故言云云二恩深難報疏計論母恩昊天罔極嗚呼慈母云何可報云云鈔次云阿難白佛言世尊父母之恩如何可報唯願說之佛告阿難若有慈孝之子能為父母於七月十五日僧自恣時造盂蘭盆獻佛及僧得福無量能報父母之恩若復有人書寫是經流布世間受持讀誦為他人說當知是人能報父母之恩故言云云二廣明恩重二初母暫離兒心驚乳溢復二初引經顯示疏至於行來東西鄰里井竈碓磨不時還家母忽心驚兩乳流出即知我兒家中憶我即便還家反如齧指心痛鈔齧指者先賢傳云蔡順字君仲汝南人也侍母至孝曾略出有客來急須見之母遂齧指順乃心痛走歸後漢時人彼以母思於子其子心痛此以子思於母其母乳流故云反如二問答釋疑二初指經伸問疏問詳此經文淺朴偏誡貧賤之流何也二三義釋之疏答君子自孝故偏誡小人又君子有簞瓢之貧何妨碓磨等事鈔論語云子曰賢哉回也一簞笥也食一瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也孔曰顏淵樂道雖簞食在陋不改其所樂也顏回君子尚有簞瓢之貧何妨富者而有碓磨之事疏又偏敘艱勤之語始彰鞠養之勞耳二子歡母喜養育忘疲疏又云其兒遙見母來或在欄車搖頭弄腦或復曳腹隨行嗚呼向母母為其子曲身下就長舒兩手摩拭塵土嗚和其口開懷出乳以乳乳之母見兒歡兒見母喜二情相交恩愛愛重莫復過是云云鈔次下云二歲三歲弄意欲行至於食時非母不知父母行來值他坐席或得餅果不敢噉啜懷歸與子十來九得恆常歡喜一回不得嬌啼佯哭嬌子不孝必有五摘孝子不嬌必有慈順二子長不孝四初子長忘恩父母繫念疏既生長大朋友相隨梳頭摩髮欲得好衣服蓋其身弊衣故破父母自著新好綿帛先與其子至於行來官私急疾傾心南北逐子東西二夫妻娛樂疏棄二親疏橫簪頭上子漸長大為與索妻得他女子父母轉疏私房室內共相語樂三親老無依日夜嗟歎疏父母年老氣力衰微終朝至暮不來借問或復父孤母寡獨守空房猶如客人寄止他舍常無恩愛或無襦被寒凍苦辛厄難遭之太甚年老色衰多饒蚤蝨夙夜不臥長吟歎息何罪宿愆生此不孝之子四違罵父母喜順妻兒疏或時呼喚瞋目驚怒盡不從順婦兒罵詈低頭含笑乃至云云鈔乃至云云者彼云婦復不孝子復五摘夫妻和合同作五逆彼時呼喚急疾走使父母之語十喚九違盡不從順罵詈瞋目何不早死強在地上父母聞之悲哭懊惱流淚雙下啼哭目腫汝初小時非吾不長但吾生汝不如本無佛告阿難若有善男子善女人能為父母受持讀誦書寫父母恩重大乘摩訶般若波羅密經一句一偈一經於耳所有四重五逆十惡等罪皆悉消滅永盡無餘常得見佛聞法速得解脫三聞者悲傷疏帝釋梵王諸天人民一切衆會聞經歡喜發菩提心號哭動地淚下如雨鈔發菩提心修行作佛誓報多生父母之恩皆得道果二釋彼經意三初母慈子逆疏評曰細思其事誠哉是言或有母不如此兒不如彼者百中無一也鈔或有母不如此初慈後歎兒不如彼初嬌後逆而能自幼至長母慈子孝兒婦養親者百中無一也若百中有一千中有十萬中有百億中有千孝者甚多也目觀時事行孝順者萬中有一也二不孝所以疏良由衆生無始無明迷真執妄既根本顛倒故枝末一一皆然三念彼沈淪疏禍哉凡愚云何可度鈔禍哉者驚歎之詞疏三攀慕遍尋即以道眼觀視世間鈔疏科二初別釋經文疏述曰觀求生處是天眼通由證道而得故云道眼世間有二謂三界是器世間六道是有情世間二總釋經意疏然尊者喪親之日猶是凡夫不知父母生於何道今成聖果力可追求故以天眼上下觀視於三界處尋六道身得通便觀故云即也四得見所在見其亡母生餓鬼中不見飲食皮骨連立鈔疏科二初會不言父疏述曰本觀世間俱尋父母父生樂處不假施勞既非經宗故此不述二正釋見母三初總釋經意疏母生鬼道已屬三塗復在餓中是鬼之極苦拔濟苦者唯盂蘭盆發起正宗意在斯也二別明因果疏生餓鬼中是異熟果酬引業故不見飲食是等流果酬滿業故是慳貪業之果也皮骨連立是增上果鈔此況論五果一者異熟果謂有漏善不善法所招隔世自相續身異熟無記謂前世造業今世受果或今世造業來世受果異時而熟名為異熟或因通善惡果唯無記異類而熟名為異熟此上二解異通因果或善惡業未得果時興取果用至得果時興與果用取果與果功用有殊名之為異復是能熟變令熟故異即是熟異熟之果名異熟果二者等流果此有二類一真等流善等三性自類相望種子引種子種子生現行現行熏種子同等流類名等流果二假等流果似先業假名等流實增上果如由殺生招短命報不殺招長命報等故唯識云謂習善等所引同類或似先業後果隨轉名等流果三者離繫果聖道離繫證無為果四者士用果謂諸作者假諸作具所辦事業得成就故此有二師解一云謂如農夫假諸作具辦稼穡果士用之果也二云非唯外色通於色心如俱舍說但有因得俱生無間隔越不生士用果如心心所同聚多法更互為俱有因更互為俱生士用果前念一聚齊等有力引次後念為無間士用果今世造業來世受異熟果亦名隔越士用果無漏心聚斷障證滅亦名不生士用果無為不生故五者增上果因有勝力名為增上果從彼生增上之果也然善惡業總有三種一唯感總報二唯感別報三通感總別二報由貪瞋癡發不善業招感地獄鬼畜之果間斷十善感人趣果純十善業感天趣果總別報業亦名引業滿業舊鈔云問如何是引滿二業答善不善業皆有三品此復有三一約境善則於劣不殺為上謂蚊蚋等於勝不殺為下謂父母等餘者為中不善翻此思之二約心於善不善但猛利心作為上泛爾心作為下餘者為中三約時亦通善不善業三時無悔為上二時無悔為中一時無悔為下此善不善業雖通三類然取有力引生諸趣果者而為引業若無勝力引總報果但於總報之上別別莊嚴者而為滿業又凡作業有加行根本後起三心亦取強勝有力名為引業除別力劣名為滿業此中所明慳貪發業能得四果除離繫果感總報業能引鬼趣總異熟故感別報業慳思吝食能滿鬼趣饑餓事故果似先業是假等流此能感業有增上力感鬼形狀皮骨連立是增上果業有士夫力用之功招感鬼趣色及心品是士用果三重廣鬼趣二初正明鬼趣復二初引文廣示又二初正理論說亦二初鬼類差別復分三初鬼住處疏準正理論鬼本住在此洲之下五百由旬縱廣亦爾有琰魔羅界一云在此贍部四邊直下等從此展轉散取餘方鈔由旬正云瑜繕那限量義十六里也南北曰縱東西曰廣梵語琰魔羅王舊名閻羅王訛略也此云靜息王能善說法令受苦者息瞋等故亦名饒益王衆生受苦不憶舊事王誨示之令憶舊事知諸衆生各自作業各自受苦不生怨恨新業不作故業已盡便得離苦由此益物名饒益王婆沙七十二云鬼世界主名琰魔王鬼趣攝也瑜伽云由雜染業生地獄中作靜息王按纂疏云靜息王者琰魔王也此有二類一大菩薩化作二實有情鬼趣所攝由治罰鬼兼地獄生故生地獄非地獄趣如人治罰諸畜生等二鬼壽量疏以人間一月為一日乘此積月積年壽五百歲三鬼流類三初總有三種疏然鬼有三種一無財鬼以無福德不得食故二少財鬼少得淨妙飲食故三多財鬼多得淨妙飲食故二別開九類三初無財三種分二初引文顯示疏此三種鬼復各有三無財三者一炬口鬼謂火炬炎熾常從口出由是前生燒壞村柵焚炙賢良以此求財墮於地獄從地獄出墮此鬼中故正法念經云若人貪嫉枉奪人財破人城郭殺害抄掠得財奉王大臣轉增𠒋暴墮熾然餓鬼中二針咽鬼謂頭大如山咽如針孔由於破齊夜食盜竊衆僧之食故故齊法清淨經云目連路逢數百萬鬼頭如大山等三臭口鬼謂口中腐臭自惡受苦以多貪名利自是非他讚歎惡人毀謗賢善故二警誡後人疏據此三種寧吞鐵丸不食信施二少財三種疏少財三者一針毛鬼毛利如針行便自刺為貪利故妄行針灸及刺畜生但為求財不愈疾故二臭毛鬼毛利而臭自拔受苦由於販賣猪羊烹宰鵝鴨湯爛刀剝楚痛難堪地獄罪終墮斯鬼趣三大癭鬼咽垂大癭自決噉膿由嫉妒於人常懷瞋恨故三多財三種疏多財三者一得棄鬼謂常得祭祀所棄食故由於罪多福少少施多慳棄擲之物方惠施故二得失鬼謂常得巷陌所遺食故以於現財常生慳著疑欲失者而方捨故三勢力鬼謂夜叉羅剎毗舍闍等所受富樂類於人天或依樹林或住山谷或居靈廟或處空宮形竪而行屬於鬼趣此等變化多端者由於因地罪福不精苦樂之因相雜作故鈔夜叉正云藥叉翻為勇健亦云暴惡飛行空中食噉生類此雄者也雌者地行名羅剎娑此云可怖畏鬼毗舍闍正云畢舍遮此云醜鬼也三餘指他文疏付法藏傳說僧伽耶舍比丘遊大海邊見妙宮殿其家鎖二鬼等云云鈔付法藏傳第六卷說僧伽耶舍尊者遊大海邊見七寶宮殿即往乞食見鎖二鬼各著一牀舍主以食供養比丘語言大德慎勿以食與此餓鬼比丘見鬼饑困與少許食鬼得食已即吐膿血遍流在地汙其宮殿比丘怪問舍主答言斯鬼前世一是吾息一是兒婦我常布施作諸功德彼恆恚惱我數教誨都不納受因立誓曰如此罪業必獲惡報若受罪時我當看汝由是因緣得斯苦惱更有多類如彼說之二歸經所說疏今尊者之親是無財鬼中炬口鬼也無財不見飲食故炬口食未入口化為火故二瑜伽論說二初鬼類差別疏又有處說餓鬼有三種一外障得遇水時即見有人執刀仗等而障礙故二內障口有火炬或咽如針故三無障見河是猛火或食糞穢或自割身肉食噉等鈔瑜伽論說餓鬼有三一外障礙飲食鬼二內障礙飲食鬼三飲食無有障礙鬼二歸經所說疏今尊者之親當內障也二法喻釋成疏上來諸鬼皆由自心因行所招果報必應譬如影響由於形聲二勸人省察二初直勸修善疏雖父母至親不相替代故諸智者宜各勵心儻遇善緣不應空過一朝去世誰為修崇縱託子孫七分獲一況無孝子悔恨何追鈔言七分獲一者修福子孫自收六分也仍須修者運大至誠仗於三寶威德力故能令亡者獲一分福若不至誠全無所獲隨願往生經說父母兄弟親族為其亡者修福七分之中獲一分也何以故緣於前世不信道德故於七分獲一若以亡者嚴身之具堂宅園林以施三寶此福最多拔地獄苦往生浮土二指事令省二初示無仁孝復二初指陳世事疏且濁世凡流鮮懷仁孝唯憂妻子豈念幽靈貧賤者迫以饑寒富貴者荒於財色設能追福厭課者多竭力罄心萬中無一世途目擊豈不昭然鈔內心不欲外鼓虗名謂之厭課竭罄皆訓盡也擊觸也二引經釋成疏故恩重經云夫妻和合同作五逆彼時呼喚急速走使父母之語十喚九違不相從順罵詈瞋目生存尚爾歿後可知二子父相承疏自既不仁兒豈能孝故昔有送父林野乃持輿回歸以古觀今雖途跡異而心同也鈔孝德傳云孫悟之子元啓時年十歲其祖年老啓父輿送深山啓苦諫之父不從諫啓收輿返父曰何用子曰後當送父父遂感之收親侍養啓父不孝送父深山啓亦效之收輿送父上行下效不孝相承以古觀今古今跡異相效心同也疏五慟哭往救目連悲哀即以鉢盛飯往餉其母鈔疏科二初目連悲哀分二初疏主潤釋復二初以義廣釋疏述曰悲哀者生育恩重如上所陳死別隔生忽然再見縱使顏容仍舊亦可啼泣悲傷況覩鬼形皮骨連立喉中烟𦦨腹裏空虗苦似倒懸命唯喘息豈不能碎身劈踊竭氣號咷恨罪逆之偷安痛慈親之受苦二顯經總相疏經標總意但曰悲哀細察當時何疑不爾二引古證成疏故三藏科云摧慟釋云感激徹於骨髓號呌動於天地二以飯餉母疏鉢飯往餉者母既氣綿夕漏厄在朝饑饑而且渴理須救濟濟此之急飯食為先故以鉢盛飯持餉於母鈔氣綿夕漏者夕夜也命唯殘喘氣弱綿微夜永苦長漏刻難曉厄在晨朝饑火所逼對上夕漏且云朝饑實於朝夕皆饑虗耳疏六惡習現前母得鉢飯便以左手障鉢右手揣食食未入口化成火炭遂不得食鈔疏科二初正釋此文分二初總釋經意又分三初業果決定復二初總明因果疏述曰境隨心變果藉業成餓因未除飽緣寧致二法喻釋成疏鬼是炬口食近口而熾然水作堅冰冰近湯而確耳二小聖難移疏即知神力不禁業力除饑要且除慳故六通往餉而招殃百味盆維而致苦鈔禁平聲盆器也百味飲食羅列器中以奉於母食變成火故言致苦三驚歎勸思疏大哉業熟可思者焉二別釋經文疏今左手障鉢慳恐餘侵右手揣食貪於自給慳貪猛盛如此現行飯食劣緣若何充濟故化為火不得食也二結歸序分疏上來序分竟自下第二正宗分文分為二初目連悲陳苦厄後如來廣示因緣鈔今詳三分第一序分序致說經初起之源由為正宗之漸始名為序分第二自此已下至慈愛之恩為正宗分正是世尊對機說法逗令修學進趣本旨所敬所崇尊主義故名正宗分第三末後五句為流通分說利已訖付囑時機大衆護持流通不墜名流通分正宗分二初別示目連救母方便後普示大衆資親要門後一復次文是也初文分二初目連悲陳苦厄後如來廣示因緣疏今初目連大呌悲號涕泣馳還白佛具陳如此鈔疏科三初白佛之意疏述曰子急告父臣急告君自力不如理宜投佛二敘自所得疏弟子勤觀四諦已證三明可以反覆山河回轉日月鈔三明者宿住智證明生死智證明漏盡智證明即六通中三通也為破三際愚故立此三明如次能知去來今世三際之境明了證知不虗謬故智即證明名智證明對三際境依主可知三正伸哀懇疏豈料母縈極苦命若倒懸竭其孝誠盡其神變而竟不能令除惡報暫濟饑腸所以呌泣奔還備申哀懇疏後如來廣示因緣且依三藏大分八段第一彰母罪深第二明子德劣第三斥邪無力第四顯正有能第五許以救方第六示其正法第七孝子領悟第八慈母獲益鈔疏分八段今束為二初六如來廣示救母之方後二衆聞歡喜利益之相學者隨文提舉說之疏今初佛言汝母罪根深結鈔疏科二初引經總釋疏述曰有經中說定光佛時目連名羅卜母字青提羅卜欲行囑其母曰若有客來娘當具膳去後客至母乃不供仍更詐為設食之筵兒歸問曰昨日客來若為備擬母曰汝豈不見設食處耶從爾已來五百生中慳慳相續故云罪根深結鈔上生疏云定光佛者即然燈佛也二釋自經意二初次第釋經又二初正釋經文疏罪謂身口之業根謂慳貪之心多生相續為深交固難解為結從慳所起皆是罪業非唯彼時一度妄語鈔罪謂身口之業者唯識等云能動身思說名身業能發語思說名語業審決二思意相應故作動意故說名意業取不善思可怖可厭名之為罪又罪者摧也摧善法故根謂慳貪之心者耽著已得財法不能惠捨祕吝名慳於諸未得有及有具希欲名貪由此慳貪引生諸惡慳貪名根根者出生義故而此慳貪近於心故名慳貪心也身語意罪及慳貪根皆深厚故皆結縛故名罪根深結二釋成三事疏謂慳貪是苦根所作是苦業餓鬼是苦果為三事也二重釋根義疏若準十重戒中慳亦是業唯貪為根起罪業故鈔慳吝為自困之本棄生之因不慳為自富之源攝生之首教示菩薩攝化衆生制戒遮慳故名慳戒既遮慳已業無由起翻以無貪發起施行攝化衆生唯識瑜伽說業是思遍行法數慳依貪立隨煩惱數業體是思思通三性故有善惡之業慳體不爾無善慳故許慳是業違理背教三問答釋妨二初多生何趣妨復二初問疏同五百生慳為人為鬼二答疏答人鬼相間造受相資若唯人身不名惡報若唯鬼身不應造業或亦為畜於理無妨但慳習不除即名相續鈔人趣身上造鬼總業當受鬼報鬼趣身上造別善業助鬼身中昔時所作感人趣業即受人果故云造受相資疏反釋云若唯人身由善業招不名惡報非慳業感故若唯鬼身不應惡趣造總報業感人趣果論說三塗無分別煩惱不能造業感總報故畜趣準此諸趣通論經五百生二偏救青提妨二初問疏問目連自定光佛世已來所生之母不一如何偏救彼之青提二答疏答青提與目連緣深今生復為其母但救此身所生之母非謂救彼遠世青提餘論云云皆為未達第二明子德劣非汝一人力所奈何疏述曰汝母慳心慳於一切時經多世事歷多人豈汝一人力可濟拔第三斥邪無力汝雖孝順聲動天地天神地祇邪魔外道道士四天王神亦不能奈何鈔疏科二初總釋經意疏述曰三藏云縱汝感天靈於上界激地祇於下方縱攝邪魔橫羅外道統六合以同一家總八部以為一衆併其神力亦不奈可鈔六合者四方上下也八部者天龍夜叉等二逐難別釋疏外道道士者外道中之道士也簡內道中之道士佛教初傳此方呼僧為道士故四天王者毗沙門等護持世界者也鈔邪魔者梵語魔羅此云破壞破壞勝事立此號也名波卑夜此云惡者舊云波旬訛也外道道士者三乘法外妄生推求別為途道名為外道外道自謂我是道德之士也姚石書云始乎漢魏終洎符姚皆號衆僧以為道士至元魏武帝世時太建二年有寇謙之輩始竊道士之名私易祭酒之稱四天王神者東方持國南方增長西方廣目北方毗沙門此云多聞也皆住妙高第四層級各居一面統御四洲亦住七金山頂靈通自在四皆名神疏第四顯正有能當須十方衆僧威神之力乃得解脫鈔疏科二初正釋此文疏述曰三藏云一縷不能制象必假多絲一人不能除業必資衆德二通前總釋疏今詳前後經文以邪正一多相對乃有四句一正而非多此不能救故前非汝一人奈何二多而非正亦不能救即前神祇邪魔外道等也三亦多亦正方可救拔即十方僧也四不多不正居然不可故無經文第五許以救方吾今當說救濟之法令一切難皆離憂苦疏述曰今當說者正是許詞救濟法者是所許事令一切等者千鈞之弩不獨為鼷鼠發機三界之尊豈偏令汝母離苦鈔十鈞者三十斤為一鈞計斤可知機弩牙也說文鼷謂小鼠也經言令一切難離苦者由此標舉生下通別救苦之兩意別示目連通示大衆故六示其正法三初科判經文疏第六示其正法於中分二初教孝子獻供之法後教衆僧受供之儀初復有五一定勝時二發勝意三設勝供四讚勝田五獲勝益二釋五段意疏謂自恣日為勝時如春陽之月孝心為勝意如精新種子百味五果等為勝供如好牛犂以之供養如能耕墾賢聖為勝田如膏腴之地存亡父母六親眷屬乃至七代離苦生天為勝益如千箱萬斛秋收冬藏經文意勢豈不然乎智者詳之如指其掌鈔箱大車也詩云乃求千斯倉乃求萬斯箱鄭氏注云求千倉以處之萬車以載之斛者百升為斛秋既收成冬則藏稸喻意可解豈不然乎者五段文勢豈不道理如是乎意趣不遠如指其掌中之物三隨科解釋疏今初第一定勝時佛告目連十方衆僧七月十五日僧自恣時鈔疏科二初釋經本文三初十方衆僧分二初別釋僧義又二初通釋衆和疏述曰梵語僧伽此云衆和合謂若衆而不和如羣商羣吏及軍衆等不名僧寶若和而不衆如二人同心之類亦非僧寶衆而和合為福之因方名僧寶鈔僧有二種證理聖者名理和僧未證真理具大戒者名事和僧三人已上方名為衆衆義狹故若於身中有和義者一人兩人亦得名僧是彼類故如三千界中麟角聖者名僧寶故言二人同心者易繫辭云子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭解云君子出處語默不違其中則其跡雖異其道必同如金雖斷而分之其性不異也佛教以四人和合成衆故二人雖和亦非衆矣二釋成和合疏和合者此有六種謂身和同事語和同默意和同忍戒和同修見和同解利和同均也儒說小人君子或和或同今釋子比丘和而同也鈔論語云君子和而不同小人同而不和何晏解曰君子心和然所見異故曰不同小人所嗜好者同之然各爭利故曰不和釋子比丘具六和德同出世道亦和亦同也二總釋文疏今云十方者法無限局豈隔親疏衆僧者唐梵重標譯人之拙鈔譯人拙者如疏云衆僧受供蓋取文詞穩順令人易解所以華梵雙標二七月十五疏七月十五日者前三月夏安居竟故可自恣自恣有三日或十四十五十六今舉中間也鈔西域記云坐兩安居舊云坐夏坐臘斯皆邊制非中國之正旨僧祇亦云兩安居起世經云五月十六日注云西域此時安居漢地安居已經一月至八月十五日安居滿也注云西域此時自恣漢地已經一月然準四分五分十誦及正法念成佛經善見明了毗尼母薩婆多摩德勒伽論等或自披讚或章疏引或問先德略有三十餘本教文皆言夏安居議曰印度節氣稍晚說兩安居漢地節氣稍早說夏安居或隨方應機所說有異未爽通途佛制安居總有三意一無事遊行妨修出世事業二損傷物命違慈悲心三招世譏嫌世譏之云鼠尚有窟穴沙門釋子何不知時佛因制之然安居有三謂前中後四月十六日結前安居衆僧兩兩相對各云大德一心念我比丘某甲於某聚落某僧伽藍所大界內前三月夏安居房舍破修治故三說從四月十七日至五月十五日相續結之為中安居五月十六日結後安居其前安居至七月十五日滿後二安居隨前安居自恣住待日足方得出界若閏四月前四月結夏若閏七月前七月解夏閏五月六月亦一百二十日安居若前安居滿受功德衣後二安居滿不受功德衣以不及時無功勞故然此方僧尼依四分律具戒住持安居之內或為三寶事父母病亡生善滅惡事等若當日往還者但白同意比丘即得出界要護來日明相若有經宿乃至七日緣應作對首法七日出界已還來此中安居若七日已外緣應受半月法若十六日已外緣應受一月法此二名衆法須衆僧和合白二羯磨方得出界事訖還來安居至安居日滿僧尼受歲解夏自恣集衆行籌等同布薩法但以自恣字替布薩字應差二人各具兩種五德者謂不愛不恚不怖不癡知自恣不自恣此五名自恣德又知時不以非時如實不以虗妄利益不以損減柔軟不以粗獷慈心不以瞋恚此五名舉罪德意欲無諍令人懺悔美德外彰能善勸喻離過愍物故差二人各具兩種五德者也上座籌量令人白二羯磨差之索欲問和如常末後答云差受自恣人羯磨羯磨者牒云差受自恣人羯磨大德僧聽苦僧時到僧忍聽僧差比丘某甲某甲作受自恣人白如是作白成不答云成大德僧聽僧差比丘某甲某甲作受自恣人誰諸長老忍僧差比丘某甲某甲作受自恣人者默然誰不忍者說僧已忍差比丘某甲某甲作受自恣人竟僧忍默然故是事如是持羯磨成不答云成五德受差已至上座前胡跪作和答云單白和僧自恣羯磨大德僧聽今日衆僧自恣若僧時到僧忍聽和合自恣白如是作白成不答云成白已令人行草人別一剪次第行之各說偈云吉祥長者施軟草如來受已成正覺我等比丘學佛慧坐草自恣淨三業行草已訖五德至上座前胡跪告云一切僧就草坐偏袒右肩胡跪合掌僧皆依唱次正對僧自恣法第一五德至上座前大敷坐具胡跪合掌上座亦胡跪合掌衆僧皆隨上座儀式應云大德一心念衆僧今日自恣我比丘某甲亦自恣若見聞疑罪大德長老哀愍故語我我若見罪常如法懺悔三說第二五德至第二座前第一五德復至第三座前乃至下座皆爾衆僧說已五德至上座前跪云僧一心自恣竟便禮已而退若五德及衆僧舉得罪者依法懺之律中又云僧十四日自恣尼十五日相依問罪故十六日方得出界三僧自恣時二初評議僧字疏此剩僧字去之又句闕亦是譯人之失也何不云共自恣時二正釋自恣二初釋名顯意復二初以義正釋疏自恣者自己之過恣他所舉謂一夏安居九旬加行不階四果亦得四禪佛設教門本意如此正像末法僧等皆然鈔佛滅度後有教行證名為正法但有教行而無果證名為像法唯有其教無行無證名為末法記正像法皆一千年末法一萬年由度尼故正法減半或說不減依舊千年為尼行八敬法故二引經釋妨疏雖後五百歲亦有持戒修福者故福是定也二重廣行相三初自恣之意疏然將超苦海謹護浮囊猶恐當局者迷必藉傍觀得失縱不斷惑證果還希罪滅福生鈔謹護浮囊者涅槃經云如世有人欲渡大海得一浮囊專心保守不令少損時有羅剎言如是浮囊可全乞我彼人不從如是乞半乞如手許乞如指許乃至一微塵許皆不從之彼復思惟一塵雖少亦不得與漸令囊損不能渡海如是比丘保守五篇淨戒浮囊亦復如是乃至不與煩惱羅剎一微塵許破戒因緣若有少損則不能度生死大海也當局傍觀碁喻可知二自恣之詞疏故褊袒於衆中白大德長老或見我過或聞我罪或疑我犯恣任所舉哀愍語我我當懺悔鈔懺悔者梵語懺摩此云悔往亦云悔過追悔已往之過罪故三自恣之益疏如此則身心清淨猶如琉璃禪定解脫或有之矣二顯福殊勝二初疏自顯示疏供養此者力用可知豈不拔濟先亡資熏現在二引古釋成疏故三藏云比丘受歲之日大衆自恣之時僧多獲道於四果故能濟厄於七代二發勝意當為七世父母及現在父母厄難中者鈔疏科二初疏釋經文二初正釋經文疏述曰當為者能救之心七世下所救之境約境明心故云勝也七世者所生父母不同儒教取上代祖宗厄難中者通於存歿歿則地獄鬼畜存則病痛枷禁皆名厄難二別釋疑難疏七世父母雖似轉疏皆是生我修道之器既蒙鞠育豈負深恩二引古釋意疏故三藏云天地覆載既無憚於劬勞幽顯沈淪理合答於罔極三設勝供具飯百味五果汲灌盆器香油錠燭牀敷臥具盡世甘美以著盆中供養十方大德衆僧鈔疏科二初別釋經文二初敷設勝供復二初釋上五句又二初次第釋經又分三初別釋味塵疏述曰具飯百味者總標也如人盛饌盤筵邀命賓客唯云喫飯故飯為總統於百味百者大數非定一百五果者一核果如棗杏桃李等二膚果如瓜梨奈椹等三殼果如胡桃石榴等四糩果如蘇荏等五角果如菱豆等上皆舌所嘗也二通釋四塵疏汲灌盆器者沐浴等所用并下牀敷臥具皆身所覺也香者鼻所嗅也油錠燭者照燎等用眼所見也亦可香油塗身亦屬身攝西域如此盡世甘美者亦屬舌也三結指闕具疏上來於五欲境中唯闕聲也二重廣意趣二初依經釋意疏盡世之言詳其意趣有二種盡謂富貴則盡世所有有即須求貧賤則盡力所及及則須覔即知不定少多之物但在竭盡其心二引俗類顯疏亦類彼享于克誠馨於明德也鈔尚書云鬼無常享享于克誠又云至治馨香感于神明黍稷非馨明德唯馨彼以克誠之懇明德之馨感於鬼神此以孝誠之懇戒德之馨感於聖賢赴會垂恩救濟存歿二釋下一句疏著盆中者譯經訛錯如何牀等可置盆中應云著盂蘭盆供會之中也二供十方僧疏供養二句者正明行也二總釋經意二初疏自釋意疏據經本意但以可受用物供養大德之僧不必雕鏤金玉剪割繒綵高聳欄架等也二引古釋成疏故三藏云汝須物華四事盆美八珍房舍衣服飯食湯藥為四事食之米麵味之鹽醋果之李奈之芥薑為八珍歷十方而運想澄一心而供養四讚勝田當此之日一切聖衆或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大衆中皆同一心受鉢和羅飯具清淨戒聖衆之道其德汪洋鈔疏科二初科指文意疏述曰初二句約人讚時而總標末二句以威儀讚人而總結中間人法有其五對但文不次二依科釋義二初分對總釋又二初開為五對釋疏謂處有山間樹下對證有四果六通對行有自利利他對經行自利教化利他學有戒定對各有其文人有大小對亦名權實對聲聞緣覺為實為小十地菩薩為權為大二束為一對釋疏又總束之不出人法謂三學三乘對也從初至四果禪定也次從或在下至自在教化智慧也皆同下三句淨戒也三乘即聲聞緣覺十地大人也二逐難別釋二初釋同一心疏皆同一心是意和合謂受供時皆同運慚愧殷重心慈悲報恩救濟心人雖位有凡聖德有優劣而所運心一而無異故云同也鈔皆同一心者疏五義釋一慚愧心崇重賢善輕拒暴惡二殷重心殷勤鄭重離憍慢故三慈悲心愍覆衆生拔苦與樂四報恩心念於施主與福利故五拔濟心資益施主父母等故經標聖衆有聖之衆故疏兼凡夫於設會處有凡僧故凡聖總爾故曰皆同二釋受鉢飯二初別釋經文又二初釋經文義疏受鉢和羅飯者鉢中飯也梵云鉢多羅此云應量器和字訛也今時但云鉢者略也鈔鉢和羅者經音義云鉢和蘭此云自恣食此義為正順經意故二因會經題疏經題云益即是鉢也譯時隨俗題之云盆盆之與鉢皆是器故故三藏釋題翻為救器二總指經意疏此一句經正明自恣大德受盂蘭盆供也鈔此一段經今詳分二初正示勝田後指喻歎德示勝田中初標後釋當自恣日赴會聖衆略示四德一禪定謂得四禪及九定故二聖果得預流等四道果故三經行自喜法樂念利他故如經布絹之往來名經行也四得通六通自在化衆生故具此德者謂聲聞緣覺十地菩薩菩薩大人位高難見現比丘相在大衆中此三乘人皆同一心受自恣飯後佛歎云此三乘人具清淨戒聖衆道德深而復廣如水汪洋疏五獲勝益有其供養此等自恣僧者現世父母六親眷屬得出三塗之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光鈔疏科二初科指經文疏述曰此一唱經有兩節意初一半者蒙悲願之力而離苦後一半者蒙慈願之力而得樂樂中有存亡之異鈔兩節意者初二句文貫後節意初節復有離苦得樂二意如經可知二依科釋義二初別資歿故分二初父母親眷復二初生身父母又二初依經正釋疏初云此等自恣僧者指前五對所說也現世父母者生此身父母也非謂未亡名為現世故指得益云出三塗其現在未亡之父母下自有文云福樂百年是也不應重舉二指古說非疏三藏錯會故作異釋甚非文意鈔三藏錯會者三句破古也義淨三藏云云何現在言出三塗答驗因知果故若爾次說現在便是重繁故錯會也二六親眷屬疏六親者父母兄弟夫妻或云男女不取兄弟眷屬者一切姻戚通於表裏鈔六親者鄭氏注周禮云父母兄弟妻子也善見論云六親有二一父六親伯叔兄弟兒孫二母六親舅姨兄弟兒孫皆是同姓義親不雜餘姓也眷屬者親眷明屬通於表裏父母枝派也二離苦解脫疏出三塗解脫者總名離苦也衣食自然者且翻三塗生於人天故屬拔苦之文亦可得樂屬於後也二普利存亡疏若父母下明存亡得樂文相可知天華光者天上妙華光明也略快樂之相矣自下第二教衆僧受供養之儀時佛敕十方衆僧皆先為施主家呪願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前衆僧呪願竟便自受食疏述曰此中前半淨三業後半具三寶前中呪願口業禪定意業受食身業後中塔前是佛呪願是法受食是僧從他受而後食法律如此即受字亦屬法也塔者邊國訛語正云𡨧堵波此云高顯處此中意通殿塔塔安舍利殿安佛像鈔經家佛敕衆僧受供儀式應淨三業然後受食呪願語業受食身業意業為先起身語故而必有之故略不言其禪定意屬所為機不須雜於衆僧三業如來在世衆僧受供安在佛前如來滅後安塔寺中佛前供養佛故衆僧呪願即是法僧三寶具矣呪願雖是僧語本是佛說僧但傳之故屬法寶也疏自下大文第七孝子領悟時目連比丘及大菩薩衆皆大歡喜目連悲啼泣聲釋然除滅疏述曰淨業既成必知離苦觀因驗果聲響不差故喜而止啼也如處世刑獄囑大力人財賄既行其心已喜鈔經言釋然除滅者釋解也憂悲解散心喜豁然啼聲除滅也疏第八慈母獲益時目連母即於是日得脫一劫餓鬼之苦鈔疏科三初評議釋經二初議經闕略疏述曰目連聞經且是受教施設盆供合在餘時今說經次便云脫餓鬼者譯經闕略也二以理潤文疏應於正宗終處敘結集家文云爾時目連聞是法已至七月十五日施設盆供供自恣僧已其母即於是日得脫一劫餓鬼之苦則文義俱顯矣二引古釋意疏故三藏云孝子既獻供於此晨慈母乃除殃於是日大哉聖力速疾如斯三指陳餘義疏其餓鬼受苦年劫時分待檢敘之鈔此一節經結集序致七月十五日目連設供之時母於是日脫餓鬼苦也次云目連復白佛言顯是一會躡前而起故云復白不須加文疏自下大文第三流通分也鈔流通分者如何世尊於付囑遺法流通分中普為大衆顯示盆會利益之相逗令修學奉親行孝佛心平等必不於正宗分中開示目連流通分中遺言示衆若謂此經前後兩會說者如何後會抑為流通進退詳之定是正宗故目連云若未來世一切佛弟子亦應奉盂蘭盆救度父母可為爾不為衆請法救度父母非是請問受持遺法佛言大善快問我正欲說汝今復問乃至廣說設供救親利益之相非是付囑受持遺法正義釋者此經一會正宗分二初別示目連救母方便後普示大衆資親要門初段如前後段分二初目連啓請後世尊為說說中分二初讚印許說後正答所請答請分三初教起勝行二教起行意三教常設會隨文提舉可知疏流通分中有三一申請目連復白佛言弟子所生母得蒙三寶功德之力衆僧威神之力故若未來世一切佛弟子亦應奉盂蘭盆救度現在父母乃至七世父母可為爾不疏述曰說此語時亦是設供之後非一席之事至畢鉢羅窟方始總集為經也目連愛其親而及他人如潁考叔諫莊公也鈔潁考叔言春秋傳廣略其要云鄭武公娶姜氏生莊公及共叔段莊公寤生驚姜氏遂惡之寐寤而莊公已生故驚而惡之愛共叔段欲立之欲立以為太子亟請於武公公弗許及莊公即位請京使居之謂之京城大叔京城今滎陽京縣也大叔完聚完城郭聚人民繕甲兵具卒乘步曰卒車曰乘將襲鄭夫人將啓之掩不備曰襲啓開也莊公遣使伐之大叔出奔共音恭國名也共國今汲郡共縣遂置姜氏于城頴置置也城潁鄭地也誓曰不及黃泉無相見也既而悔之潁考叔為潁谷封人封人典封彊者聞之有獻於公公賜之食舍肉公問之對曰小人有母皆嘗小人之食未嘗君之羮請以遺之公曰爾有母遺我獨無也頴考叔曰何謂也公語之故且告之悔對曰君何患焉若掘地及泉隧而相見其誰曰不然公從之公入隧中其樂也融融融融和樂貌也姜氏出隧其樂也泄泄音曳舒散貌也遂為母子如初君子曰潁考叔純孝也純猶篤也愛其母施音異及莊公疏二讚請佛言大善快問我正欲說汝今復問疏述曰初句標讚大善快問者深契聖心後二句釋所以以正欲說即遇問詞機感相投潛通密應故言快問佛本意者欲說孝道最大故拔苦事重故盂蘭法勝故世尊覩衆勝緣機熟可教化故三答請於中有五一教起行善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七世父母於七月十五日佛歡喜日僧自恣日以百味飯食安盂蘭盆中施十方自恣僧鈔疏科二初釋孝順之人疏述曰雖貴賤品隔僧俗道殊自非化生濕生無不有父有母慈烏鸚鵡尚解思恩豈況人倫而不濟拔鈔雜寶藏經說過去世時雪山之中而有鸚鵡常採花果稻穀奉盲父母是時田主案行苗稼見諸禽蟲剪穀穗處便設網羅捕得鸚鵡鸚鵡告言田主先有好心言所種穀要與衆生而共食噉由是之故咸來採取如何今日而見網捕但以種子如父田似於母實語如子田主如王擁護由己我等如民依之而住田主聞已即放鸚鵡佛言田主者舍利弗是盲父母者今淨飯王摩耶夫人是取穀鸚鵡者我身是也慈烏如常二釋孝順之行二初總釋孝行又二初正釋經意疏孝子利害已具懸談既識是非須依正道故云應先為所生等也二因辨藏攝疏據制令必為不為即是違制故亦當於制教是以前判亦屬律藏二縱奪釋成疏然佛無悲喜今於此日示現歡喜者應機緣也以佛本出世只為勸人修行見人造惡則悲見人修善則喜今比丘九旬加行日滿倍更懇誠三千界中皆同如此稱佛本意寧不欣歡此日設供其福甚矣鈔九旬者六藝論云黃帝佐官大撓造甲子立干神十謂甲乙丙丁戊己庚辛壬癸支神十二謂子丑等支干合數干盡為旬謂甲子乙丑乃至癸酉而為一旬餘甲戌等例知三月安居故成九旬三千界者具云三千大千世界謂四大洲日月乃至初禪各有一千以鐵圍山總而圍之量等二禪名小千界復以十箇小千是一萬百箇小千是十萬千箇小千是百萬以鐵圍山總而圍之量等三禪名中千界復以十箇中千是千萬即此千萬總為一億百箇中千是十億千箇中千是百億此千中千即是大千世界以鐵圍山總而圍之量等四禪以大兼小合此小千中千大千名為三千大千世界也經言善男子者成就信等諸善根故比丘者正云苾芻言含五義一曰怖魔初出家時魔宮動故二曰乞士乞食濟身乞法資道故三曰持戒漸入僧數持淨戒故四曰淨命不依於貪邪活命故五曰破惡漸依聖道滅煩惱故尼者女聲女具五德名苾芻尼宰相者宰主也相助也為主割斷助於君故三公者起自周時謂太師太傅太保也公正也有功之臣忠正無私曰公百官者百司之官官公也觀也依公執政觀察人情決斷是非也萬民者兼有位者萬類人民也庶人者庶衆也無位之衆故曰庶人總有十類行慈孝者如經可知疏二教發願願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極疏述曰所修必假行門所獲必由心願願者心之樂欲欲得存歿咸安存者保壽於人閒常無病惱歿者遷神於天上永絶冥塗行願相資無所不利三教常作是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩疏述曰是佛弟子修孝順者反明非佛弟子及不孝順者即任不設盆供也念念常憶者無終始也長養是事慈愛是心故前起行及發心願以報之也餘文可解三藏云父母結愛既念念不去心孝子報恩須年年不絶供鈔念念常憶者孝無終始也逆推孝行法爾常規故無其始順推孝行盡未來際故無其終所生父母者意說其子所有生身父母也疏四勸受持若一切佛弟子應當奉持是法疏述曰智度論云信力故受念力故持今云奉者即受之義應當者勗此二力鈔此下流通分也復分為二初二句世尊付囑後三句衆喜奉行今初若凡若聖在家出家信佛弟子汝等應當奉行其事利益存亡受持其教領納文義故經云爾疏五喜而奉命時目連比丘四輩弟子歡喜奉行鈔疏科二初釋四輩弟子疏述曰四輩者僧尼士女或云人天龍鬼疑故兩存二釋歡喜奉行疏然凡厥生靈皆依恃怙故父母恩均於天地此雖至孝不得其門今受神方信知靈驗必能除七世之所難報二親之劬勞自知心有所之是以歡喜承命鈔自知下之至也四輩弟子聞佛說已自知孝心而有所至是以顏舒而歡心悅而喜承佛敕命信受奉行經言四輩弟子者藥師經云比丘比丘尼清信士清信女然四衆四部四輩經論常談疏中二解初是後非不須兩存智生師後名弟解從師生名子故名弟子天親菩薩釋伽耶山頂經云歡喜奉行有其三義一能說人清淨二所說法清淨三依學之者究竟得果清淨由此三義歡喜奉行乃為偈曰盂蘭盆奧旨略釋讚幽邈福利自他親度苦證常樂經疏鈔音釋經疏剎法師舊本作利字誤窘巨隕切迫也又音郡有解招難舊本六慈恩有解今勘浙本及川本古疏皆無慈恩字況慈恩法門宗匠必時人不敢容易指斥故從而削去鴻臚下音閭九寺名也鴻大也臚陳序也言大陳序所須以禮待外國之賓也菉菽音緑叔豆也拊音撫拍也簞瓢上音丹竹器也下毗消切蠡也即匏片持水耳弄腦舊本作挊義同襦音儒短衣蚤蝨音早瑟厭課上音魘塞也課責也當二親齊忌無至誠修福但厭塞人之課責故為之耳揣食上初委切私取也又準藏中本經音義亦團呼之攬取也豈料料量也豈料者不能測量也居然上音基語助出禮記注文膏腴音高俞肥也鼷音兮名甘口鼠好食牛角核音鶻本下革切語忌也糩苦外切準四分律行事鈔云糩果柔修淨音義指歸云糩粗糠也果子殼如糠注云松柏之子也蘇荏下音稔說文桂荏蘇也菱音陵芰也錠音定燈也燎音了火也汪洋深大也財賄下音晦財也此喻時人所忌然疏文盛行未敢輒改潁考叔上庾頃切說文水出潁川陽城也鈔申引春秋云潁考叔為潁谷封人注云典封疆者春秋疏正義曰周禮封人掌為畿封而樹之鄭玄云畿上有封若今時界也言潁谷封人皆以地名封人蓋封人職典封疆居在邊邑潁谷是國之邊邑也如今之守邊城寨主勗許六切勉也勸也即勸勉信念二力今受神方結前目連問教信之靈驗結前設供獲益鈔載則也上音再則也即是語助與且字同不須云荷載鉢剌下音辣梵語彈舌呼也隋煬下音漾隋朝帝號圊音青廁也莪音俄和和二皆去聲呼之應聲也厭課厭去聲疏音義中音魘別作一義解詳義取捨稸敕六切積也箱舊本疏中作廂傳誤鈔文隨而解釋今依古疏勘定改正作箱故引毛詩并注證之易繫辭繫音係聯也舊本鈔引千字文注解二人同心且非經史況彼人姓管名寧字幼安又將一人名字分作兩人說之難為依據故今從周易繫辭并注文改正耳安居此段鈔文數處差誤極害義理已依律中改正其餘義稍可通故存舊說浮囊下奴當切有底曰囊無底曰槖此所引涅槃經有五重乞喻五篇罪犯今次第引之配合可解至治下音雉舊作理字者以唐高宗諱治故作理呼今依尚書正文也亟請上音器數也完聚上音洹兮也舍肉上音捨置也遺之上去聲呼贈也已上兩卷音釋並依原本略取舍之
