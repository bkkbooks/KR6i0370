body:
  text: 佛説盂蘭盆經聞如是一時佛在舍衛國祇樹給孤獨園大目犍連始得六通欲度父母報乳哺之恩即以道眼觀視世間見其亡母生餓鬼中不見飲食皮骨連立目連悲哀即以鉢盛飯往餉其母母得鉢飯便以左手障鉢右手揣食食未入口化成火炭遂不得食目連大呌悲號涕泣馳還白佛具陳如此佛言汝母罪根深結非汝一人力所奈何汝雖孝順聲動天地天神地祇邪魔外道道士四天王神亦不能奈何當須十方衆僧威神之力乃得解脫吾今當説救濟之法令一切難皆離憂苦佛告目連十方衆僧七月十五日僧自恣時當為七世父母及現在父母厄難中者具飯百味五果汲灌盆器香油錠燭牀敷臥具盡世甘美以著盆中供養十方大德衆僧當此之日一切聖衆或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大衆中皆同一心受鉢和羅飯具清淨戒聖衆之道其德汪洋其有供養此等自恣僧者現在父母六親眷屬得出三塗之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光時佛敕十方衆僧皆先為施主家呪願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前衆僧呪願竟便自受食時目連比丘及大菩薩衆皆大歡喜目連悲啼泣聲釋然除滅時目連母即於是日得脫一劫餓鬼之苦目連復白佛言弟子所生母得蒙三寶功德之力衆僧威神之力故若未來世一切佛弟子亦應奉盂蘭盆救度現在父母乃至七世父母可為爾不佛言大善快問我正欲説汝今復問善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七世父母於七月十五日佛歡喜日僧自恣日以百味飯食安盂蘭盆中施十方自恣僧願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩若一切佛弟子應當奉持是法時目連比丘四輩弟子歡喜奉行佛説盂蘭盆經報父母恩呪世間有生無不從父母而得能誦此呪及能慎終追遠恩無不報南無蜜栗多哆婆曳娑訶七月十五日盂蘭盆念誦式出家之士清規具載在俗高賢當依此式正月必須入於塔寺中大會修設凡孝順男女欲報生身父母必預七月初一日為始每日晨朝然香奉供務在精專修小彌陀懺或禮三十五佛代為存亡父母懺罪至速往無量光佛剎白云我等同孝志修行淨土因報答二親恩懺除三障罪存者獲福壽亡者得超升盡法界冤親同生安養國舉盂蘭盆經畢念阿彌陀佛真金色云云緊念阿彌陀佛百聲觀音勢至清淨海衆各十聲畢回向云以此修行衆善根報答父母劬勞德存者福樂壽無窮亡者離苦生安養四恩三有諸含識三塗八難苦衆生俱蒙悔過洗瑕疵盡出輪回生淨土至晚禮三十五佛了白云我等同孝志云云畢念彌陀經洎念往生呪畢舉阿彌陀佛真金色云云念阿彌陀佛百聲千聲并菩薩聖號發願云願所生父母或今存在或已終亡隨其所居逐彼生處惟願阿彌陀佛觀世音菩薩大勢至菩薩光明照燭願力攝持三障銷除五根成立發菩提願修淨土因存者得滿報齡終歸寶剎亡者即捐諸趣便托蓮胎覩妙相明心聽玄談入位現前授記塵剎分身廣度有情同登妙土伏願我等孝順之心深入至道之法無遺當來諸佛貪中同作應生眷屬二嚴等備三覺俱圓法性有邊願心無極盡入如來願性海中轉身對立施生並如常式或午後有暇念盂蘭盆經或念阿彌陀經畢念阿彌陀佛百聲或千聲觀音勢至清淨海衆各十聲回向云以此修行衆善根云云或再暇念金剛經或彌陀經普門品圓通品楞嚴等呪盂蘭盆齋念誦式終
