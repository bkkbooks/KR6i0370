body:
  text: 講經律論沙門遇榮鈔鈔奇哉聖主積孝行以無倫垂範資徒續良規而不墜欲曉經旨須善疏文釋此疏文大分為三初釋疏題目二彰造疏人三釋疏本文疏題分二初釋正題後釋并序正題分二初離釋後合釋離釋分二初辨所釋經題後辨能釋疏字且經題者梵語佛陀你舍烏藍婆拏門佐羅素呾纜華言覺者說救倒懸器經今以隨方生善文詞穩順含多義故所以華梵相兼仍存訛略故云佛說盂蘭盆經也梵語佛陀略言佛也此云覺者者是主義體即無漏五蘊假者也覺體是慧覺察斷障覺照真俗自覺覺他覺行圓滿三覺如次簡餘凡夫二乘菩薩唯有如來獨到彼岸跨十方而為主握五性以稱師三覺圓明故名為佛梵語你舍此翻為說振圓音而警眾揚妙義以符機益物導迷故名為說盂蘭盆者即今大宋翻經者言此皆梵語訛略也具正應云烏藍婆拏孝順義供義恩義倒懸義盆亦訛略舊云盆佐那新云門佐羅亦云門佐曩華言救器以義迴文名救倒懸器隨力所辦金銀等器器中具飯百味甘美五果等物及餘妙事供養三寶福資父母利益存亡四義意云行孝順故所以設供設供集福酬養育恩救倒懸苦正取救倒懸義餘義兼之由餓鬼等渴𦦨燒心飢火逼腹命唯喘息苦似倒懸設供集福救彼倒懸之苦故以為名然意有通別別者目連得道欲報父母之恩觀見亡母墮餓鬼中神通力小不能救之白佛世尊備申哀懇佛即為說盂蘭盆供集福薦拔即得離苦故下經云佛告目連十方眾僧七月十五日僧自恣時具飯百味五果汲灌盆器香油錠燭牀敷臥具盡世甘美以著盆中供養十方大德眾僧乃至云時目連母即於是日得脫一劫餓鬼之苦通者若僧若俗王臣庶人皆應為父母設此盆供保安薦歿故下經云若有僧尼國王太子乃至庶人行慈孝者皆應為現在父母及過去七世父母於七月十五日百味飯食安盂蘭盆中施十方自恣僧願於現世父母壽命百年無病無一切苦惱之患七世父母離餓鬼苦生人天中福樂無極盆者所設盆供能救之器盂蘭者所救之苦盂蘭之盆名盂蘭盆依主釋也梵語素呾舊名脩多羅脩妒路皆訛也此云契經存體略用但名為經天親四義釋經謂能貫穿依故相故法故義故謂於是處由此為此而有所說名之為依真俗諦相善巧等法密意等義上生疏云經者攝也貫也常也法也生資教攝永絕煩籠理藉文貫長離散滅百靈常軌干葉良規利物詮真目為經也然此經體以聲名句文四法為性由此四法能詮義故又瑜伽云一文二義而為經體以文一法進攝名句退攝於聲總以聲名句文及所詮義五法為體由此五法攝益勝故盂蘭盆之經名盂蘭盆經能說即佛名為佛說佛說之盂蘭盆經名佛說盂蘭盆經亦可所說即盂蘭盆經佛之所說盂蘭盆經持業依主可知第二辨能釋疏字者疏猶記也纂錄之義纂錄諸教相應文義釋此經意故名為疏又疏者疏平聲也分也決也疏通文義分別旨趣決擇勝劣故名疏也即以疏主聲名句文及所詮義五法為體然以先賢述作作必有意述此經疏略有三意一者為酬緇素請故故下疏云今因歸鄉依日開設道俗耆艾悲喜遵行異口同音請製新疏式允來情發揮要道二者為欲利益父母等故下云我今所讚述自他存歿親離苦常安樂三者欲留軌儀示後人故下云宗密依之修崇已歷多載兼講其誥用示未聞垂範後學故造此疏南齊高祖常於七月十五日送盂蘭盆往諸寺中供自恣僧顏氏家訓云七月十五日盂蘭盆齋望於汝等依行不絕自古聖賢所尚其來遠矣皇宋三葉丁酉歲季春月嗣帝位思報昊天之恩於季夏月詔兩街僧錄問盂蘭盆儀式時左街僧錄達識大師行清令賜紫沙門省才依經附疏具錄儀式進於皇帝皇帝得已依法修設由斯此典講聽興焉今皇四葉壬戌年癸卯月嗣帝位至於秋首詔僧三七於延慶殿開建道場七日七夜晝講斯經餘時禮念至七月十五日復詔兩街僧職譯經三藏及講經律論者總二百五十人具就道場中禮八萬四千舍利寶塔於長春殿設盂蘭盆齋集諸妙利資父王之仙駕酬昊天之鴻恩皇朝異事邁古超今未之有也予於是時亦預其數故此略述欲冀英賢上行下效耳收科可知後合釋者造疏本為釋經文義顯經意趣故從所釋經以彰其名佛說盂蘭盆經之疏依主釋也收科可知第二釋并序者序猶致也序致此經孝道本末應孝子心拔二親苦酬養育恩教流此土造疏因由之事也又序者緒也如繭之得緒緒盡一繭之絲疏之得序序盡一經之意并者兼也不唯釋經兼作其序故言并序二彰造疏人疏充國沙門宗密述鈔充國者今果州西充縣也昔者漢時為充國縣今標舊名仍略縣字故云充國然其疏主本居長安住草堂寺後入終南山今標充國者意表依經行於孝道父母家鄉生緣處故行在孝誠不忘親愛故沙門者略梵語也具云沙迦懣曩此云息惡息不善故亦云勤息勤修眾善息不善故法華疏云沙門息義以得法故暫爾寧息亦息惡也正言室羅摩挐或云室摩那拏此云功勞謂修妙道有功勞故今略梵語故言沙門宗密者疏主名也文極廣略其要云圭峯禪師號宗密姓何氏果州西充縣人也建中元年生元和二年受具後謁遂州圓和尚傳契心印又徧訪名能廣乎知見講圓覺華嚴經自後乃著圓覺華嚴涅槃金剛起信唯識盂蘭盆法界觀行願經等疏鈔并集諸宗禪言為禪源詮及酬答書偈議論等總九十餘卷並傳於世文宗皇帝於太和二年慶成節詔入內殿問諸法要賜紫方袍尋請歸山至會昌元年正月六日坐滅於興福塔院其月二十二日道俗奉全身於圭峯茶毗得舍利數十粒俗壽六十二僧臘三十四後追諡定慧禪師青蓮之塔也述者敘也撰也內錄藏教外采羣書言無不經事無不古纂敘文義撰集成章名之為述唯識疏云敘理名述先來有故作故名造今新起故三釋疏本文二初疏家敘分後疏家正宗初中四初汎明孝道為經起之端由二正顯此經彰佛說之所為三教流此土遵式奉行四式歎能仁頌德祈願然此四段次第爾者為文體式欲正稱揚一事而先汎述端由言在於遠意在於近也汎述孝道本居氣象漸貫生靈釋迦孔聖皆宗於孝設教化民故有初段文也既汎述已然來委知何所以故佛說此經故有第二彰佛說之所為其所為者為孝順之子欲救慈親之苦意酬養育之恩故說此經示其妙行此說西土次應顯示此方流布傳受因由故有第三教流此土遵式奉行此方釋子依教設會講經勸眾造疏釋經垂範後學也將欲造疏求聖加護述造疏意方陳詞翰故有第四式歎能仁頌德祈願是故四段如是次第初中三初明孝道本末二初本居氣象疏始於混沌塞乎天地鈔湻元之氣清濁未分形如禽卵謂之混沌清濁已分謂之二儀謂清氣上昇穹窿無礙圓覆曰天濁氣下沈旁礴堅厚方載曰地以人居中通名三才周易鉤命決云大地未分之前名太易有太初有太始有太素有太極名五運也氣象未形謂之太易元氣始萌謂之太初氣象之端謂之太始形變有質謂之太素形質始具謂之太極轉變五氣故稱五運氣象質具而未相離皆太易之名有五種也歷帝記云天地未分謂之太易氣兆始萌謂之太初高下相應謂之太始質象既成謂之太素天高地卑謂之太極圓清方濁謂之兩儀人居其閒成三才也易緯通卦云太極生兩儀謂清氣輕者上為天濁氣重者下為地以人參之名三才也易序卦云有天地萬物然後立君臣定父子長幼夫婦之禮尊卑上下之別今顯孝道初始在於混沌元氣之中貫於五運漸隨元氣充塞天地徧三才通萬物也故孝經援神契云元氣混沌孝在其中禮記祭義云曾子曰夫孝置之而塞乎天地敷之而橫乎四海施之後世而無朝夕推之放諸東海而準推之放諸西海而準南海北海亦然爾雅云東夷西戎南蠻北狄此四晦昧無知謂之四海總其意者上至天子下至庶人盡一切時歲月朝夕徧一切處四方上下於一切物貴賤尊卑凡所進退動靜語默好惡歡慽皆順人民萬物之理名之為孝其孝損益者幽顯生靈有父母者應常慎行也慎行者敬身也敬身者不損體也不損體者不令父母憂也故謂之孝夫子云斷一樹殺一獸不以其時非孝也曾子云身也者父母遺體也父母遺體敢不敬乎居處不㽵非孝也事君不忠非孝也莅官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及於親敢不敬乎今明孝道前後言之橫該五運上下言之豎貫三才四海言之縱羅萬物至德幽微深而復廣故云始於混沌塞乎天地二末貫生靈疏通人神貫貴賤鈔孝通幽顯於顯舉人攝餘獸等於幽舉神攝餘鬼等故通人神也上至天子下至庶人總五等人其中奴婢之類皆名為賤自餘長幼皆名為貴貴賤雖殊行孝奉親彼此無異故貫貴賤也言五等人者一天子二諸侯三卿大夫四士五庶人各有一章名此五孝如孝經說彼經序云雖五孝之用則別而百行之源不殊故疏云爾二儒釋同遵疏儒釋皆宗之鈔上依儒教敘孝本末此文雙指儒釋皆宗釋教所宗疏文影略今為助者通人神貫貴賤始於真際充乎世間該聖凡被諸趣儒釋皆宗之且儒教所宗者儒有五常以仁為首仁又以孝為本由於此五立身揚名安治化百行之源是故宗之故孝經云夫孝德之本也言五常者謂仁義禮智信好生惡殺曰仁知恩報恩曰義長幼恭勤曰禮敏速多知曰智立行可依曰信又云不殺為仁不盜為義不亂為禮不淫為智忠實為信由於此五王者以之治國君子以之立身不可蹔亡謂之五常釋教所宗者釋有三學以戒為首戒又以孝為體由此孝故名稱普聞無量世界能度無數百千眾生斷障證理究竟成佛萬德之源是故宗之故梵網經云孝順父母師僧三寶孝順至道之法孝名為戒是諸佛之本源行菩薩道之根本是大眾諸佛子之根本言三學者謂戒定慧防非發善名戒心專一境名定決斷揀擇名慧又以戒定為福門以慧為智門福智二門自他俱利出生死苦入涅槃樂而此福智三學妙行常修無間證法報化三身常住如次凝然不斷相續是謂出世無比三常非如世間小小五常三指陳結歎疏其唯孝道矣鈔指陳孝行遮簡餘善故云其唯孝道君子務之為本本立而道生菩薩結之為戒戒立而果滿孝者孝順愛敬從命之義道者道理為本之義即由此行愛敬尊長從命不違示理益物能生眾德故名孝道又孝經疏云孝者事親總名也又畜也好也至順也善事父母也謂事親之道常畜在心盡其色養中心悅好承順無違故名孝也道者通達義孝行通於天下民用和睦矣語助也二正顯此經彰佛說之所為二初愍赴孝誠疏應孝子之懇誠救二親之苦厄酬昊天恩德鈔應赴也孝順之子名為孝子非謂居喪目連懇切至誠請佛意有通別別者為其亡母墮餓鬼中自救不能請佛求法而救拔之通者復為眾人皆有二親在厄難者咸欲拔濟報其恩德請佛開示要妙法門故佛世尊赴其懇誠說此法門顯示要行令救二親苦難危厄二親者生身父母及七世父母通別經文如前已引昊天者爾雅云春為蒼天夏為昊天秋為旻天冬為上天昊大也盛夏之天陽光暑氣充乎六合無有窮極百穀苗稼芳草園林由此成熟天有此恩未曾有心辭於勞苦父母亦爾生我育我腹厚於我迴乾就溼乳哺養育嚥苦吐甘慈訓長成憐念之心未曾蹔捨如此恩德未曾有心辭於勞苦故父母恩比昊天恩也恩重經云佛告大眾人生在世父母為親非父不生非母不養是以寄託母胎懷身十月歲滿月充母子俱險生墮草上乃至云非父不親非母不養慈母養兒去離欄車十指甲中食子不淨子飲母乳八斛四斗計論母恩昊天罔極嗚呼慈母云何可報佛示妙行令其孝子酬恩報德故疏云爾二指陳結歎疏其唯盂蘭盆之教焉鈔結歎可知三教流此土遵式奉行二初求法遵行復二初喪親追感疏宗密罪釁早年喪親每履雪霜之悲永懷風樹之恨鈔釁者禍之兆也早年者童稚之年夫為人子晨夕事親敬養服勞順色無犯湯凊致樂不疾亡憂乃得永存福壽奉於甘旨故父母有疾子云拙於侍養況至喪乎蓋是我之罪愆禍及父母致令童稚之年喪於二親也雪霜者祭義云秋霜雪既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有𪫟惕之心如將見之驚其景變也故於節序而相慰問皆有感愴感思之言疏主每履踐於雪月霜露之景思念父母常懷悲愴何祭義中樂正子春云舉一足不敢忘父母出一言不敢忘父母也風樹者韓詩外傳中臯魚云樹欲靜而風不止子欲養而親不待往而不返者年也不可再見者親也孔子家語中丘吾子亦有此歎臯魚自少天下遊學後還親喪故有此歎其風若止樹必安靜其親若待子必侍養致敬致樂自恨無親侍養故此歎也疏主亦爾永懷風樹之恨恨己不得侍養父母也二念報劬勞二初念世孝道不益遵靈復二初念盡於孝誠疏竊以終身墳壟卒世蒸嘗鈔竊者私竊也不形其言私思念之含文嘉云天子墳高三仞樹以松諸侯半之樹以柏大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊柳準後漢書通植松柏今言墳壟者總相思於墳墓丘壟也古者父母喪已負土為其墳壟植柏成列廬墓三年以盡孝誠孝德傳云汝南蔡順字君仲孝順父母親喪葬訖於廬墳次鳥獸從之棲宿哭時即助悲吟後漢時人類林云顏烏會稽東陽人也至孝父亡已後負土為墳感於羣烏以助銜土烏口中血出因名傷烏縣後改為義烏縣前漢時人言卒世者終身一世也蒸嘗者祭名也禮記祭統云凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰蒸取其文便而舉秋冬影顯春夏也私竊思念終此一身廬墳守壟思念聲容終此一世四時祭祀礿禘嘗蒸極盡孝行報其恩德故孝經云為之棺槨文衾而舉之周尸曰棺謂櫬身也周棺曰槨謂櫬棺也衣謂殮時之衣衾謂單被用此舉尸入棺并覆尸上也陳其簠簋而哀慼之簠簋者祭器名也受一斗二升足高一寸如龜形也簠內方外圓簋內圓外方俱丹中漆外器素無飾表有哀慼之心也擗踊哭泣哀以送之男踊謂以足跳踊也女擗謂露胷擗擊也卜其宅兆而安措之宅墓穴也兆塋域也葬事大故卜選安置也為之宗廟以鬼享之宗尊也廟貌也立其尊貌以鬼禮享之似見父母也春秋祭祀以時思之影於冬夏也寒暑變移轉加增感四時祭祀展其孝思上注皆䟽廣如彼文中具二縱奪顯無益疏雖展孝思不資神道鈔問終身墳壟四時享祀足可以展孝子之懇誠報劬勞之厚德何不依行而但思之何謂也故此釋之上句縱下句奪雖者縱奪之詞思者情也縱其施展孝行情懇終身墳壟卒世蒸嘗然而不能資益神識冥道又上句進下句退進退思之終是無益也生前敬養猶有少益歿後蒸嘗全無所濟若也蘋蘩礿禘猶不墮於二親儻或殺命蒸嘗反禍及於父母但揚虗名不資神道又若父母在於鬼趣可以饗祀若生餘道焉能受祭又於鬼中有財無障之類容受蒸嘗無財炬口之流反祭成毒故竊思之而不為也二佛法淵深能資父母三初求法遂意二初求得法門疏遂搜索聖賢之教虔求追薦之方得此法門實是妙行鈔遂者躡前起後也由前俗孝不資神道遂即搜索聖賢之教求薦親法三乘見道已前名賢修習福慧具賢德故見道已去名聖聖者正也以無漏智正合理故聖賢所說所學之教顯示無量世出世間利益之門於此教中䖍仰志求追資薦拔之方法果遂願心於藏經中得此法門實謂妙行法門者即此經也教為顯理之門出苦入樂之門名為法門實實也指陳歎美故言實謂實謂要妙酬恩孝行存亡皆濟七世咸資周孔經中曾無所聞矣二指其妙行疏年年僧自恣日四事供養三尊鈔此顯妙行之相也年年七月十五日眾僧夏滿名受歲日諸比丘等自己有過恣任他舉而懺悔之故云自恣四事者阿含經云飲食衣服臥具醫藥同下疏云物華四事謂房舍衣服飯食湯藥也供養三尊者進修財行名供有所攝資名養佛法僧寶可敬可尊名為三尊故下經云年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩又云其有供養此等自恣僧者現世父母六親眷屬得出三塗衣食自然若父母現在福樂百年若七世父母生天自在二設會薦親三講經勸眾二科合疏宗密依之修崇已歷多載兼講其誥用示未聞鈔初二句設供薦親顯自利行後二句講經勸眾顯利他行自利利他菩薩行也爾雅中卷云夏曰歲取歲星行一次也商曰祀取四時祭祀一終也周曰年取禾一熟義唐虞曰載唐堯虞舜取物終更始義載是年之別名疏主得此經已依法修崇設供薦親已歷多年也誥者經誥如言詔䇿制敕皆是教令之別名也謂治萬民曰誥命百官曰詔政諸侯曰䇿取法度曰制誡州縣曰敕今就通意法王教令名經誥也每於其日午前供會集福薦親齋後講經誨示道俗使彼未聞者令聞未解者令解同己修崇各資宗祖耳二造疏解釋二初道俗覩勝請釋疏今因歸鄉依日開設道俗耆艾悲喜遵行異口同音請製新疏鈔舊鈔云即太和二年賜紫之後表辭歸山歸山之後然請入蜀立先代傳法述祖師德業因此歸鄉開筵講經設於盆供也耆艾者老年之稱也曲禮說五十曰艾年𩯭髮蒼然如艾色也六十曰耆年身雖耆老而心彊也疏主歸鄉屬於夏滿依常年事開設盆供兼講經文教示僧俗眾覩勝事故生喜悅知恩難報故乃悲傷悲喜交徹遵教奉行身別故異口語等故同音眾請大師別製新疏削舊繁謬撮取簡要符經宗旨以順時機使見聞者知釋門之孝行逈異儒流識盆供之薦親居然脫俗如來設教意在利人眾等願聞希垂妙釋二疏主應命發揮疏心在松柏豈慢鄉閭式允來情發揮要道鈔松柏者考妣墳塋之所也心隨父母在松柏間也詩傳云五家為鄰五鄰為里亦名為閭五百家為黨乃至萬二千五百家為鄉也式者敬也允者順從也發揮者發揚揮展解釋之義疏主意云心在松柏豈敢侮慢鄉故閭里敬順鄉知來請之意由此解釋此經要道要道者要妙孝道也四式歎能仁頌德祈願二初式歎佛德復二初行孝自利德疏稽首三界主大孝釋迦尊累劫報親恩積因成正覺鈔稽首者法苑依俗解云稽至也首頭也以首至地故名稽首此即拜跪首至地故依真釋云俱舍論言稽首接足故言敬禮屈己所尊之首接彼所卑之足故言稽首即是三業敬禮之通稱也此能敬相三界已下所敬之體三界主者欲色無色三界之中化利凡聖獨自在故大孝釋迦尊者具云釋迦牟尼世尊五分律說昔有國王名懿師摩貶子出國其子因到雪山之北近舍夷林頓止此地為大國人民熾盛後父知之因而歎曰我子釋迦我子釋迦從是已後姓釋迦也姓釋迦氏名憂陀羅憂陀羅王有子名曜羅曜羅王有子名尼浮羅尼浮羅王有子名師子頰師子頰王有子名悅頭檀此云淨飯悅頭檀王有子名菩薩菩薩有子名羅睺羅故我佛得姓已來六世矣釋迦能義亦云能仁能以仁德而治化故牟尼寂義亦云寂默謂能仁氏具大悲智證寂默理有大悲故不住涅槃有大智故不住生死即是姓釋迦名牟尼也又法華疏說謂能證彼寂默理故復能離彼煩惱喧故故名能寂福慧相好勝餘羣聖世出世間咸尊重故名為世尊就結頌故略言釋迦尊也孝行深廣超諸世間故名大孝何者大孝累劫報親恩積因成正覺謂從生死長流界中始發深固大菩提心即行孝行孝行即戒也累三大劫備修孝行報答父母劬勞之恩如何報之謂現存者竭力供養勸發道心亡故者妙行潛資離苦得樂謂在三塗者拔濟令出在人天者得見諸佛聞法悟解不唯報答一生父母乃至無量生來父母六親而皆報之故律頌云流轉三界中恩愛不能捨棄恩入無為真是報恩者梵網經云一切男子是我父一切女人是我母我生生無不從之受生故六道眾生皆是我父母彼有難者應方便救護解其苦難又彼疏云攝律儀戒攝善法戒攝眾生戒如次證得法報化身故云累劫報親恩積因成正覺名為大孝然今疏意隨順初機指菩提樹下成正覺也二示孝利他德疏將永錫眾類應請演斯經欲使背恩人咸能酬罔極鈔將欲也錫賜也眾類者眾生之類不一也演者法音流注不絕如水流演也佛欲永劫法賜眾生所以應目連請演說斯經問法賜眾生有何意趣答欲使背恩人咸能酬罔極佛說此經欲令一切背恩逆人皆能酬答罔極之恩罔無也父母之恩猶如昊天無窮極矣二陳情述讚二初陳情祈願疏我今所讚述願眾聖冥加鈔此疏主自指隨世所稱世流布我也願眾聖冥加者加護有二種一顯加護謂現身語讚即所作二冥加護潛垂覆攝不現身語眾聖威重不敢求於顯加故求冥加護也我今意欲讚經述疏唯願眾聖冥垂加護慈悲覆攝使我心通妙理語巧身安然法是佛所說僧是佛弟子前但稽首敬歎於佛佛是主故義該法僧故此求願總言眾聖聖主聖法聖僧通名眾聖又解此中初頌佛次頌法次半頌僧敬歎三寶配疏可知此解文勢疏斷意不相連於其僧寶但有求願之文全無敬歎之意又求願之意唯局僧寶不貫佛法故前解正同於天親俱舍初云諸一切種諸冥滅上是諸佛也斷一切種冥謂不染汙無知證非擇滅若斷諸冥謂染汙無知證於擇滅拔眾生出死泥前句自利此句利他敬禮如是如理師對法藏論我當說二陳造疏意疏自他存歿親離苦常安樂鈔造疏集福為利自他多生父母若存若歿在人天者離病等苦常受福樂若有一生乃至多生父母在惡道者離三塗苦受人天樂在人天者離生死苦得於聖果受出世樂故疏云爾二䟽家正宗二初標列門名疏將解此經先開四段一教起所因二藏乘所攝三辨定宗旨四正解經文初中復四一酬宿因故二酬今請故三彰孝道故四示勝田故鈔疏開四段即是四門收攝無擁名之為門將欲釋經於其文前略以四門收攝經意疏平聲條旨趣顯示大綱令諸學者依門入解經宗意趣而無擁滯凡所釋義體性意趣則有所歸著也次第爾者欲釋本文先須委知說經因由為何等事佛說此經故有初門教起所因既知所因為如是如是事故佛說此經次應須知三藏五乘如何收攝故有第二藏乘所攝已知此經藏乘收攝而有所歸然未委知宗旨如何欲令學者曉於此經所崇所尊所主意旨歸趣究竟處故故有第三辨定宗旨即已曉於經宗旨趣即便科判釋經文義故有第四正解經文故此四門如是次第二隨標顯示四初教起所因復四初酬宿因故又二初敘佛孝行之意疏初酬宿因者悉達太子不紹王位捨親去國本為修行得道報父母恩鈔悉達者具云薩縛喝剌他悉陀此云一切義成世出世間之義皆成就故生迦維羅國父名淨飯母名摩耶阿私陀仙相其太子作金輪王王四天下棄而出家號一切智人化一切眾生令出生死太子長大不紹王位捨於親族去離國城入雪山中示依外道修苦樂行日食麻麥六年苦行後成正覺稱天人師說法利生報父母恩勸發道心出三界苦受勝妙樂是大報恩阿含經云如來出世必為五事一為轉法輪利眾生故二為度多生父母報其恩故三為無信人立信地故四未發菩薩意者令發意故五授當佛記為此五事故出世也二正顯說經之意疏然菩薩用心不務專己故開盂蘭法會以福自他二親此經所興本意如此鈔務者事務也事務急速之貌也二酬今請故二初酬自利請故說疏二酬今請者謂大目犍連因心之孝欲度父母報乳哺之恩故出家修行神通第一觀見亡母墮餓鬼中自救不能白佛求法佛示盆供救母倒懸鈔因心之孝者若善若惡皆因心起大目犍連因於內心發起孝行也二酬利他請故說二初目連起請疏由愛其親施及一切故為道俗弟子請佛留此法門施音異鈔施字但以試音呼之義及於上曰施音異恩及於下曰施音試尊者目連由愛其親母得離苦復以教行惠施音試於下利及一切故為僧俗請佛世尊說此經也下云目連復白佛言弟子所生慈母已蒙三寶功德未來孝子得同爾不佛言大善快問我正欲說汝今復問若比丘比丘尼國王太子乃至庶人皆同如此二酬請說經疏酬目連所請即是說經之由致也鈔此通前段自利下轉致者至也因由至極之所以也三彰孝道故三初標舉科分疏三彰孝道者復有其二一通明孝為二教之宗本二別明二教行孝之同異二隨釋二初通明孝為二教之宗本復二初正明亦二初儒教以孝為本又分三初標舉疏初通明中且明儒教以孝為本者二正顯二初總陳五孝作眾德之泉源復二初約事總顯又二初王臣行孝立廟祀親疏謂始自天子至於士人家國相傳皆立宗廟鈔家國者天子諸侯境寬名國卿大夫已下境狹名家皆立宗廟禮記祭法云天下有王分地建國分九州地建諸侯國置都立邑謂王畿內及諸侯國中置公卿之都立大夫士之邑設廟祧壇墠而祭之乃為親疎多少之數是故王立七廟親四始祖一文武二祧合為七也一壇一墠此在七外也封土曰壇除地曰墠近親封土遠親除地示將去然也謂考廟父廟曰考考成也謂父有成德之美也王考廟祖廟也王君也言祖有君成之德也祖尊於父故加君名皇考廟曾祖也皇大也君也曾祖轉尊故加大君之稱顯考廟高祖也顯明高祖居四廟最上也祖考廟祖始也此廟為王家之始故曰祖考皆月祭之遠廟為祧而有二祧二祧文武廟也文武並在應遷之例故云遠也特為功德而留故謂之祧祧之言超言其超然上去也享嘗乃止享嘗四時祭也文武特留故不月祭去祧為壇謂高祖之父也昭行寄藏武祧穆行寄藏文祧四時不祭若有祈禱則出就壇受祭去壇為墠謂高祖之祖也不得在壇若有祈禱則出就墠受祭壇墠有禱焉祭之無禱乃止去墠為鬼若又有從壇遷來墠者則此前在墠者遷入石函為鬼不祈禱也唯禘祫乃出之諸侯立五廟一壇一墠謂考廟王考廟皇考廟月皆祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇謂考廟王考廟皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇謂考廟王考廟享嘗乃止皇考無廟有禱焉為壇祭之去壇為鬼官師一廟謂考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼適士上士也官師中士下士也庶士府史之屬也王臣行孝立此宗廓宗尊也廟貌也安立形貌尊敬如在而嚴祭之依尚書中周公旦言自古先王立廟祀親不指帝代二縱奪顯孝能生眾德疏雖五孝之用則別而百行之源不殊鈔五孝者一天子孝二諸侯孝三卿大夫孝四士孝五庶人孝五人有殊其於孝道為一為異故此云爾雖復五孝用事有別然而百行之源孝道不殊水本曰源水分千派從源而出人有百行從孝而生故孝如源也二引文釋成三初孝為道德之體二孝為設教之本二科合疏故開宗明義章中標為至德要道道德以之為體教法由是而生孝文鈔開宗明義章者孝經一十八章此初章也彼疏云開張也宗本也於此章中張孝道之宗本明孝道之旨義也經曰先王有至德要道以順天下民用和睦上下無怨疏曰至謂窮理之極德為眾行之本故名至德要謂以一總眾道為眾理之要故名要道孝為道之要為德之本也先代聖王用此至德要道以順天下人民之心人民依之自相和睦尊卑上下無相怨者也今復有義至德者一孝二悌三臣此悌臣行從孝而生也廣至德章云教以孝所以敬天下之為人父者也教以悌所以敬天下之為人兄者也舉孝悌以為教則天下之為人子弟者無不敬其父兄也教以臣所以敬天下之為人君者也舉臣道以為教則天下之為人臣者無不敬其君也由此德者體也本也為廣敬之宗體作普導之本源至者首也極也總眾善之先首貫羣心之妙極故名至德言要道者一孝二悌三樂四禮五敬悌樂禮敬皆從孝生也廣要道章云教民親愛莫善於孝教民禮順莫善於悌教民親愛父母禮順兄長莫加於孝悌也悌友也移風易俗莫善於樂風俗移易先入樂聲變隨人心正由君德正之興變因樂而彰樂聲哀怨知國亡亂樂聲和美知國善政安上治民莫善於禮禮所以正君臣父子之別明男女長幼之殊故可以安上化下也禮者敬而已矣敬者禮之本也禮以恭儉莊敬為主也有禮無敬禮不可行故以敬為本也由此道者理也本也以理示於王民為本生於眾德要者略也妙也略陳孝行妙契人心居上者仁和在下者允睦故名要道至德通明孝悌臣行意在於敬孝能生敬也要道總明孝悌及樂禮敬具陳眾行前狹此寬皆以孝為正為本餘行為兼為末故此疏云標為至德要道釋云道德以之為體雙釋要道至德皆以孝為本體也又以古聖設於五教謂父義母慈兄友弟恭子孝而此五教從孝而生文不為孝即非教故故孝經云夫孝德之本也教之所由生也三孝為生道之源疏何有君子而不務本孝悌鈔務謂忽遽專好也本謂孝悌也疏是反釋意顯君子而皆忽遽專於孝行友悌也又悌者易也易慢從敬易違從順也若此孝悌成立即五常道德從此而生釋成孝為百行之源也故論語云君子務本本立而道生孝弟也者其為人之本歟弟孝經作悌也二別顯三年彰聖人之立意二初孝服三年之意疏既為天經地義須令企及俯從鈔既為天經地義者孝經曰夫孝天之經也地之義也民之行也疏曰經常也義利也天有日月星辰照臨於下為天之常道地生百穀草木以供人用是地之義利人生天地之間稟受天地之氣以成其身故法天常明法地常利而常行孝上事於父母又經曰則天之明因地之利以順天下是以其教不肅而成其政不嚴而治依孝設教法天常明法地常利以順天下人心故得教令不待誠肅自然而成不行嚴厲自然而治先王見教之可以化民也是以先之以博愛而民莫遺其親博廣也君愛其親以此化民民化君德無有遺棄其親者也陳之以德義而民興行陳說德義之美為眾所慕則民起思而行之也先之以敬讓而民不爭齋莊中正為敬推功尚善為讓以化化民民不爭競也導之以禮樂而民和睦禮以檢其跡樂以正其心則和睦矣示之以好惡而民知禁示好以引之示惡以止之則民知禁令不敢犯也言須令企及俯從者父母之喪漿不入口三日孝服三年不肖者舉心就之謂之企及賢達者俛首就之謂之俯從古聖立此時限意令行孝者上就下就故曰須令企及俯從禮記檀弓云曾子謂子思曰伋吾執親之喪也水漿不入口七曰子思是伯魚之子孔子之孫也子思曰先王制禮過之者俯而就之不至者企而及之起踵曰企俛首曰俯故君子執親之喪水漿不入口者三日杖而後起親喪三日不食不漿太近則抑於賢達太遠則遺於不肖齊此三日可謂得中三年之喪亦然蓋令賢愚俯企也孝經曰喪不過三年示民有終也疏曰此說持孝服喪之期限也父母亡已子有終身之痛服喪三年者蓋以人有賢愚喪期不可無數故制三年所以然者論語云人生三年然後免於父母之懷故報父母喪但止三年為限也冀其賢者則使割哀止痛俯就之也不肖者則使勉力企步以及之也持守三年之喪則是人子終竟父母之道故自天子下達庶人三年之喪為天下之通禮二訶誡不肖之儔疏雖論禮壞樂崩終訶衣錦食稻鈔論語云宰我問三年之喪期已久矣姓宰名予字子我孔子弟子也期周年也君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒盡也新穀既升熟也鑽燧改火期可已矣馬曰春取榆柳火夏取棗杏火秋取柞楢火冬取槐檀火一年之中鑽火異木故曰改火子曰食夫稻衣夫錦於汝安乎曰安不達子意汝安則為之夫君子之居喪食旨美也不甘聞樂不樂居處不安故不為也今汝安則為之宰我出知己之非夫三年喪天下之通喪也孔曰始自天子下達庶人也予也有三年之愛於其父母乎孔曰言子之於父母欲報之恩昊天罔極而宰予也有三年之愛父母乎三結歎疏甚哉孝之大也聖人之德又何以加於孝乎鈔曾子聞五等孝已而驚歎云甚哉孝之大也又云曾子曰敢問聖人之德無以加於孝乎豈無聖人之德加過勝於孝乎子曰天地之性人為貴性生也天生萬物人最靈貴人之行莫大於孝百行之源孝莫大於嚴父嚴尊敬也嚴父莫大於配天則周公其人也天生萬物父生於子尊敬其父莫大故配於天而同祭之始自周公以父配天故曰其人也周公姓姬名旦當周成王時為太師以是三公之首故曰周公昔者周公郊祀后稷以配天后稷乃周之始祖也郊者郊壇亦名圜丘祀天之處也周公攝政因行郊天之祭乃尊始祖后稷故以侑坐配食於昊天上帝於圜丘之上也宗祀文王於明堂以配上帝明堂者布政之宮也在城南七里之內居陽明之地故曰明堂周公尊祀其父文王以侑坐配食於五方上帝於明堂之上也是以四海之內各以其職來祭君行嚴配之禮見德教垂於四海海內諸侯各修職貢來助祭也夫聖人之德又何以加於孝乎此結答曾子也聖人亦依孝而治也二釋教以孝為本二初標舉疏次釋教以孝為本者鈔諸經論中說於七佛可類世間立宗祖故如七廟也亦教弟子孝順七世父母故又云六道眾生皆是父母故故以其孝為設教之宗本也言七佛者毗婆尸等是二正顯二初總明佛教復二初約佛定教權實疏然一切佛皆有真化二身釋迦化身說隨機權教舍那真身說究竟實教鈔佛有三身謂法報化報身復二謂自受用及他受用四佛權實有其二義一者法身稱實報化是權實者諸法體真權者事相權跡般若論云應化非真佛亦非說法者應者報應酬因之義自受用也應者應現應十地現他受用也此二應身及變化身皆非真佛亦非真說法者意顯法身乃是真佛真說法者令報身智冥會真性義同言說也二者法身及自受用身唯佛與佛乃能知之是身之本故名為實若他受用及變化身下類凡聖而皆能見是身之末故名為權法報實身自利功德不對機說他化權身利他現故對機說法佛地等經瑜伽等論皆廣顯示其他受用為十地菩薩現十重身說十度等皆名實教所詮妙理稱菩薩機非權設故其變化身對三乘凡及二乘聖說三乘法對大乘機即名實教對二乘機即名權教如法華中羊鹿牛車喻於三乘權實異故然其法體如一味雨潤於三草草異雨一法唯一味利三乘機機異法一由機領解各各不同隨機判教故有頓漸權實等異所以然者此蓋由佛昔於曠劫修習慈悲喜捨隨順眾生智解淺深應機設化而利益之修習圓滿已至果位不加功用任運起心運大慈悲應一切機演一切法由任運力發一語言含種種義隨諸眾生信解淺深領受各異對小機宜即此一言顯小乘法令其悟入對大機宜即此一言顯大乘法令其悟入對頓悟機即名頓教對漸悟機即名漸教乃至廣說隨其所對治貪治瞋淺深權實隨機有異無量差別故無垢稱云佛以一音演說法眾生隨類各得解華嚴亦云如來以一語言中演說無邊契經海然今疏云釋迦化身說隨機權教局之甚也慈恩三藏云梵語毗盧遮那此云徧寂周徧寂靜目法身也梵語盧舍那此云光明徧照身光智光內外照故目於報身通自他二報佛也梵網疏云盧舍那此云滿淨眾德圓滿障清淨故華嚴仁王梵網三疏皆云毗盧遮那此云光明徧照此與滿淨皆目報身約其離障名為滿淨約其光德名為徧照義雖兩途理歸一體故新華嚴疏云毗盧遮那佛舊經云盧舍那佛議曰此蓋梵音聲勢相近譯者不審翻目有異應取慈恩三藏而為楷定感通錄中諸天之子告宣律師言諸師翻經互有所失但奘法師一人翻譯無違梵本師資傳受足可為凖也疏以舍那真佛對機說法者自報名真真實體故他化名應應佛現故如法華云善男子我實成佛已來無量無數不可思議劫告善男子而自稱我顯是應身又云成佛已來無量劫等乃是真佛然應身是用真身是體用不離體名為即應之真即於應身之上說真佛故故盧舍那目自受用名為真佛對機說法若約異應之真者異於應身之外別說真佛真體應用行相別故如說自報真佛諸根相好一一無邊若他化佛各有大小隨機現故今既對機說法此盧舍那目他報身名應佛也若翻上說即真之應者即於真佛之上而說應佛真體應用不相離故如華嚴云佛身充滿於法界普現一切羣生前上句真佛下句應佛此名即真之應佛普利羣生也若約異真之應者異於真佛之外別說應佛真體應用行相別故如說自報真佛唯佛見之不對機故他化應身對機說法如是真佛應佛或即或異自在無礙是謂諸佛不可思議疏依初類故以舍那真佛說於實教依第三類釋迦化佛說於權教慈恩法師依第四類故唯他化對機說法也故法苑等指此舍那為第二重他報應佛坐千葉蓮華應二地菩薩說戒波羅密其於頓教唯一漸教三時如別章說二明教所詮宗致疏教者經律也經詮理智律詮戒行二別顯宗本二初標舉宗本疏戒雖萬行以孝為宗鈔三聚淨戒攝萬行故然雖萬行施設有殊皆以孝為所崇所尊所主故為宗也二引文釋相二初舍那所宗疏故我盧舍那佛最初成正覺時便說華嚴大經菩薩大戒鈔華嚴云佛在摩竭提國菩提場中始成正覺乃至十世界微塵數菩薩圍繞說法經標化佛始成正覺以是即應之真佛故目盧舍那始成正覺也梵網云我今盧舍那方坐蓮華臺方始也始坐華臺顯是初成佛也今依慈恩指此舍那佛是第二重他受用身也因位孝順三聚無虧得成佛故故初成道說菩薩戒勸他同我得成佛故略有二意一令菩薩持戒成佛二令千華上佛傳戒付授千百億佛轉化眾生故梵網云時蓮華臺藏世界赫赫天光師子座上盧舍那佛放光光告千華上佛持我心地法門品而去復轉為千百億釋迦及一切眾生次第宣說受持讀誦一心而行二釋迦所宗二初初成佛時以孝結戒復二初成道時處疏又經標云爾時釋迦牟尼佛初坐菩提樹下成無上正覺已鈔此下皆是梵網經文即次前文千百億中一佛傳法來此示相成佛也二孝順之相二初結戒之相疏初結菩薩波羅提木叉孝順父母師僧三寶孝順至道之法亦同孔聖云至德要道也鈔此顯所結戒相也結戒相已於菩提場說十世界海次第說法至摩醯首羅天王宮廣說此戒復從彼天至菩提樹下為此地上一切眾生重說此戒也彼疏釋云以是諸佛本源戒故法爾合行故亦成佛即結戒也波羅提木叉者此云別解脫各別防非得解脫故簡非二乘及定道戒也孝順者愛敬從命之義此即能孝順心也所孝順境有其四種父母者以有生育之恩故須孝順現存者竭力供養發以道心過往者戒善潛資咸令離苦又一切眾生無非父母既具饒益即成孝順又現或無力因戒成佛無所不度為大孝也師僧者簡非餘僧以有訓導之恩故須孝順前是色身父母此是法身父母又前即生其道器此乃生其道果也三寶者以有拔濟之恩故須孝順謂非佛無以垂教非僧無以弘通也至道之法者真如法性也至謂至極萬法由生簡異諸法故云至道之法離過契合名孝順也問師僧豈非僧寶至道豈非法寶而重說乎答親愛教誨故究竟所證故由是開之成四種境注同孔聖云至德要道者意說孝順便是至道之法也今詳不同彼言至德要道即是孝行孝行是心此言至道之法即是真性真性是境心境不同無勞異釋二會釋名義疏孝名為戒亦名制止鈔一切眾生皆是父母既不於彼行殺等事而反生於慈愛等心以此便能合三寶意符契真如即孝順四境也制者謂制善令行制惡令斷止者唯令止惡明開密遮也斯則戒與制止皆孝順之別名耳據此則一切聖教皆成孝順之義也二餘一切時以孝勸人疏涅槃亦云奇哉父母生育我等受大苦惱滿足十月懷抱我身既生之後推乾就溼除去不淨大小便利乳哺長養將護我身以是義故應當報恩隨順供養鈔應結云今為顯此孝順之行故說是經下凖此結二結之疏上通明二教以孝為本竟二別明二教行孝之同異二初科分疏次別明二教行孝之同異者於中初明其異後顯其同初謂生前侍養異後謂歿後追思異二隨釋二初明其異復二初正明又二初生前侍養異亦二初正顯復分為二初儒宗事跡疏侍養異者儒宗則慎護髮膚揚名後代故樂春不出曾子開衾鈔慎護髮膚者孝經云身體髮膚受之父母不敢毀傷孝之始也父母全而生之子當全而歸之故不敢毀傷也立身行道揚名於後世以顯父母孝之終也立其身德行其孝道播揚其美於後世光顯其親也故行孝以不毀為先揚名於後祭義云樂正子春下堂傷足數月不出猶有憂色門弟子曰夫子足瘳矣數月不出猶有憂色何也樂春曰善如爾所問善如爾所問吾聞諸曾子曾子聞諸夫子子曰天之所生地之所養唯人為大父母全而生之子則全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子跬去弭切半步也步之閒不敢忘孝是以憂色也論語云曾子有疾召門弟子曰啟予足啟予手鄭曰受身體於父母不敢毀傷故使弟子開衾視之詩云戰戰兢兢如臨深淵如履薄冰孔曰喻己常戒慎恐有毀傷也而今而後吾知免夫小子周曰而乃今日而後我自知免於患難矣小子者呼諸弟子欲使聽誌其言知而行之也二釋門行孝疏釋教則祝𩬊壞衣法資現世故優陀通信淨藏回邪鈔祝斷也斷其鬚髮表斷煩惱結縛割愛辭親決其志操學佛修行報父母恩普利含識故律頌云毀形守志節割愛無所親出家弘聖道誓度一切人又云流轉三界中等壞衣者壞變也變本白色為青黑木蘭之相與道相應不爾增貪與道相違也故梵網云所著袈裟皆使壞色與道相應皆染使青黃赤黑紫色一切染衣乃至臥具盡以壞色若一切國土中人所著衣服比丘皆應與其俗服有異祝髮壞衣翻護髮膚也翻彼揚虗名於後代且言法資現世其實資於三世一切父母又梵網云燒身燒臂燒指供養諸佛不爾非菩薩也翻儒可知優陀通信者賢愚普曜經文皆廣略其要云佛告優陀耶汝以神足變現迦維羅國令淨飯王信我成道有勝功德時優陀耶奉教變現不思議事說佛功德王見聞已告優陀耶汝往佛所稱我志意白於悉達汝本有要得道當還願依往言時來相見優陀耶到具宣王意佛尋許可七日當往時優陀耶白王消息王聞歡喜告語諸臣佛當還國莊嚴宮城極令清淨塗治街陌徧樹幢幡饒儲香花當俟供養嚴辦已訖與諸羣臣四十里外奉迎世尊佛與眾俱八金剛力士住在八面四大天王各在前導時天帝釋與欲界諸天侍衛其左時梵天王與色界諸天侍衛其右諸比丘僧列在其後佛在眾中放大光明輝耀天地威踰日月普與大眾乘空而往漸欲近王下齊人頭王與臣民夫人采女見已歡喜王等禮拜王禮拜時佛現神變諸方出沒意遮眾生誹謗事故佛即至地問訊父王少病少惱起居輕利禮問畢已王等與佛一切大眾還於國中說法化利得道者眾法華經說淨藏淨眼二子教化父王捨邪入正可知二結之疏是謂為善不同同歸乎孝鈔儒宗示善慎護髮膚等釋宗示善祝髮壞衣等是謂為善事相不同同歸乎孝義意不殊二歿後追思異二初二教雙陳分三初居喪異又二初儒宗事跡疏歿後異者復有三異一居喪異儒則棺槨宅兆安墓留形鈔居喪異者初歿居喪儒釋大同葬後異也孝經云子曰孝子之喪親也哭不偯禮無容言不文服美不安聞樂不樂食旨不甘此哀慼之情也疏曰哭不偯者哭聲不委曲也痛切之極其聲一氣往而不返不委曲也答人弔問舉措進退觸地哀切無趨翔之容貌也哀慼在心出言不為文飾也孝子喪親心如斬截賢達者有終身之痛不肖者無畢日之哀故聖人制之以縗麻為衣服縗者當心麤布長六寸闊四寸麻謂腰絰首絰縗之言摧絰之言實孝子覩之感思父母實摧其心故美服於身而心不安也聞其歌樂心不悅樂旨者美也哀慼在心食美不甘蔬食飲漿充其腸也此哀慼之情結上六事然古聖立法父母之服有齊斬之異父斬衰三年父在為母齊衰期年除徹三年心喪自唐高宗上元元年十二月二十七日天后上表請父在為母終三年服下詔依行至垂拱年中始編入格至玄宗開元五年左補闕盧履冰等上言駁諫為非自是卿士之家父在為母行服不同是非紛然至二十年蕭嵩與諸學士改修五禮又議請依上元年敕父在為母齊衰三年為定敕下依行安墓留形者以父母屍安置墓中是謂留形或為二事屍安墓中而留形像置堂殿中棺等如前二釋門孝行疏釋則念誦追齋薦其去識鈔念佛菩薩讀誦經律齋會追資薦拔父母過去靈識梵網經云父母和尚阿闍黎亡滅之日及三七日乃至七七日應讀誦講說大乘經律齋會求福資於亡者又云父母死亡之日應請法師講菩薩戒經福資亡者得見諸佛生人天上齋忌終身皆此文證隨疏說之二齋忌異二初儒宗事跡疏二齋忌異儒則內齋外定想其聲容鈔齋淨也淨心潔志謂之內齋離諸聲色謂之外定想父母聲語音如在想父母容行坐若舊故祭義云致齋於內散齋於外齋之日思其處所思其語笑思其志意思其所樂思其所嗜齋三日乃見其所為齋者也二釋門孝行疏釋則設供講經資其業報鈔設供講經助彼善業令受勝果人天福報此蓋由於能資功德不思議力使之然也良由諸佛菩薩已斷法執礙解所知障故證不思議無礙理故故於事相不被色拘色空互入大小互容自在而轉一切無礙名事不思議只如毛吞巨海芥納須彌若有問言為展毛孔令其寬廣受大海耶為縮大海令其細小入毛孔耶若展毛者毛端尖小本相如故如何展之若縮海者大海深廣本相如故如何縮之芥納須彌為問亦爾請示行相應誨彼言若有如上展縮行相顯示道理即是有可思議也為由不可思惟展縮行相不可議論舒卷所以是故名為不可思議也今憑眾聖不思議力設供講經尊親苦令受福樂也三終身異二初儒宗事跡疏三終身異儒則四時殺命春夏秋冬鈔祭統云凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰蒸此夏殷時祭名也至周時則改春曰祠夏曰礿秋曰嘗冬曰蒸礿禘陽義嘗蒸陰義禘者陽之盛也嘗者陰之盛也故曰莫重於嘗禘夏者尊𢍉禮著秋者萬物成熟各稱盛也二釋門孝行疏釋則三節放生一歲終二夏滿三忌辰隨力所及皆須為父母放生命一七乃至七七之數初七諸七卒哭祥日亦然異今時俗但滿三年施戒盆會此經云云鈔大唐所譯藥師經云彼琰魔王主領世間名藉之記若諸有情不孝五逆破辱三寶壞君臣法毀於信戒琰魔法王隨罪輕重考而罰之是故我今勸諸有情然燈造幡放生修福令度苦厄不遭眾難施戒者戒以孝順為體故偏言之其實通施一切佛法也迦葉經云若恒沙世界珍寶滿其中以施諸眾生不如以法施施寶福雖多不及一法施一偈福尚勝況多難思議放生施法集福薦親也二對明勝劣二初對明損益復二初勸人取捨疏良由真宗未至周孔且使繫心如愛禮存羊之類也今知禮有所歸不應猶執權教鈔依周書異記周昭王即位二十四年甲寅之歲四月八日佛生周穆王即位五十二年壬申之歲二月十五日佛滅後漢法本內傳云後漢第二主孝明皇帝永平七年乙丑歲帝夢見丈六金人項佩曰輪光明赫奕飛空而至色相無比明帝寤已大集羣臣以占所夢通人傅毅奏曰臣聞西城有神人號之為佛今陛下所夢將必是乎國子博士王遵對曰臣按周書異記周昭王時有聖人出在西方其時太史蘇由奏於昭王一千年後聲教被此陛下所夢必是此焉明帝信然即遣中書侍郎蔡愔秦景國子博士王遵等一十八人西訪佛法至中天竺國遇摩騰竺法蘭二三藏愔等求之東行二人乃誓至弘通至十年戊辰歲十二月三十日達於洛陽明帝大悅而極重之別立精舍安止今白馬寺是也即漢地僧之初寺之始也白氎上畫釋迦形相出四十二章經一卷即此土佛法之始也依六十甲子算之自周穆王即位五十二年壬申之歲二月十五日釋迦入滅至今大宋四葉乾興元年壬戌之歲凡經一千九百七十一年也周孔者周公孔子二聖也孝經疏云夫子姓孔名丘字仲尼魯國鄒邑縣平昌闕里人也殷本紀云孔子父叔梁紇母顏氏名徵在魯襄公二十一年生哀公十六年夏四月卒春秋七十三歲也國臣紀云夫子當周第二十三主靈王二十六年庚戌歲十一月四日於兖州泗水縣生至周第二十六主敬王四十三年壬戌歲四月八日卒也列子云商太宰見孔子曰丘聖者歟孔子曰聖則丘何敢然則丘愽學多識者也商太宰曰三王聖者歟三王夏殷周也夏禹為舜司空有賢德能治水置九州分地界鑿龍門山舜見有功禪位與之天下歸化父子十九世也殷者始為商代後改為殷殷時湯王是夏桀之臣見君無道遂伐之德化天下父子三十世也周文王始為西伯在岐州紂民八十餘萬戶皆投西伯伯給與衣食子武王紹位伐無道紂德化天下父子三十七世也孔子曰三王善任智勇者聖則丘不知又曰五帝聖者歟五帝少昊顓頊高辛唐堯虞舜也設教化民教名五典孔子曰五帝善任仁義者聖則丘弗知又曰三皇聖者歟三皇伏羲神農黃帝也設教化民名三墳也孔子曰三皇善任因時者聖則丘弗知商太宰大駭曰然則孰者為聖孔子動容有間曰西方之有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉空寂經云儒童菩薩號曰孔丘故知周公孔子聖人知人未達因果之理隱而不說且令繫念父母深恩使祭宗廟也注愛禮存羊者列國諸侯每月朔早皆祭宗廟時魯國自文公至哀公七代不行政禮有司仍供備其羊論語云子貢欲去告朔之餼羊鄭曰牲生曰餼禮人君每月告朔於廟有祭謂之朝享魯自文公始不視朔子貢見其禮廢欲去其羊也子曰賜也爾愛其羊我愛其禮包曰羊存猶以識其禮羊亡禮遂廢也愛惜也達鑒賢士今知佛法因果報應理有所歸堪依崇福薦拔尊靈不應猶執儒宗權教屠生祭廟二釋勸所以三初放生梵福疏且福之大者莫大於施生是釋梵之本因類天地之大德易有此文鈔十善十惡相翻立之十惡業中罪莫大於殺生十善業中福莫大於施生下品施生人趣之因中品施生欲界天因上品施生色界無色界天因今於中品略舉一類帝釋之因於其上品通舉色界四禪梵王之因是故施生是釋梵之本因也類如易云天地之大德曰生聖人之大寶曰位今既殺生天下之悖德曰害也二殺生非仁疏今殺彼祭此豈近仁心是若可忍孰不可忍鈔好生惡殺曰仁是者此也忍者容也孰者誰也殺彼牛等祭此考等如此則不近仁心反害生性此若可容誰不可容三殃及先祖疏雖云祈福月令云九月中氣日在氐命有司合秩蒭以養犧牲乃至祭宗廟之靈為人祈福也實是立讎自徇虗名殃於神道故途中有歌哭二類鈔注月令者彼云九月中氣日在氐昏須女中斗建戌位之中霜降後日在氐宿也於日昏時女宿正中斗建戌位也乃至是月也命有司合秩蒭以養犧牲九月合收木秩蒭草也犧牲謂純色牛羊豕也以供皇天上帝名山大川四方鬼神以祭宗廟社稷之靈為人求福雖云祈福以殺命故實是立於怨讐也徇衒也但是其子自衒虗名反殃父母神道也譬喻經云餓鬼五百歌舞而行好人五百啼泣而行如來說言餓鬼家中子孫作福當得解脫是故歌舞好人家中子孫唯行殺害將受大苦故啼哭也問孔子既是聖人何故令人殺生祭廟殃及父母子孫殺命其過不無何用此乎答對機立法務在益物事淺意深不拘小節如世尊言一切有命者不得故殺意令達士行慈悲故然亦許登地菩薩殺邪見惡人令一切人皆生正見不造惡業孔聖立法殺生祭廟令一切人皆行孝順不造逆罪孝為百行之源益多損少事近意遠漸化之耳冀諸賢達於其儒釋釋中權實觀機利鈍誨令取捨二問答釋疑二初問疏問父母生於餘趣則可改祭為齋如墮鬼中寧無饗祀二答二初祭祀無益故疏答黍稷非馨蘋蘩可薦應知礿祭勝於殺牛鈔黍稷非馨者尚書云至治馨香感於神明黍稷非馨明德惟馨古聖政治至極者美德馨香感動於神明非黍稷之馨乃是明德之馨也爾尚式時周公之猷訓爾應崇尚式敬周公之遺訓也惟日孜孜無敢逸豫周公沒後姪成王重於周公所營故命君陳分政東郊彼處為治成王誠言惟日孜孜依政治之不得逸豫蘋繁者蘋大萍也蘩皤蒿也周易既濟卦云東鄰殺牛不如西鄰之礿祭謂紂步東都文王為西伯故曰東鄰西鄰文王礿祭謂薄祭也祭之以蔬果而民仰道德紂主殺牛謂嚴祭也祭之以犧牲而民惡悖德應知祭祀在於道德不在殺牛總此疏意黍稷為饍而不馨香唯德馨香以有德故蘋蘩薦享鬼神受之故知文王蔬果而祭勝於紂主太牢祭也以彼類此孝德馨香齋供蔬食勝於殺命由此宗親承於齋講誦經等福若在鬼等三惡道者令生人天在人天者復增福壽見佛聞法也二不容受饗故疏況鬼神等差豈皆受饗鈔炬口鬼等惡業力故不容受饗鬼神食氣名饗也應結云今為示此追齋設供盆會事故而說是經二結之疏上明異竟二顯其同二初科分疏次顯其同者復有其二初明存歿同後明罪福同二隨釋二初明存歿同復二初正明又二初依儒標指疏今初約紀孝行章中五句之文以辨其同即攝於生前歿後也鈔紀孝行章者於此章中紀錄孝行事故彼初標云孝子之事親也次五句釋如疏五中初三生前後二歿後儒釋誨示事相大同意趣淺深勝劣有異隨疏可知二儒釋雙陳五初居則致其敬疏一居則致其敬者儒則別於犬馬釋則舉身七多鈔致盡也平常居止則應盡心至極恭敬也論語云子曰今之孝者是謂能養去聲至於犬馬皆能有養上聲不敬何以別乎釋氏孝者普曜等說父王淨飯見佛禮拜爾時世尊涌身空中高七多羅樹諸方出沒王禮佛已佛乃下地發言問訊起居父王佛受禮者僧俗之儀盡矣不正受者遮謗之意備矣起居王者父子之禮足矣七多羅樹者其樹高四十九尺以七尺為一仞七仞為一多羅樹七多羅樹計三百四十三尺也摩耶經說佛涅槃已摩耶自忉利天下執佛衣鉢錫杖號慟悶絕佛以神力令棺開發合掌而起放光問訊曰遠屈下來諸行法爾故入涅槃願勿啼泣阿難問佛後人有問如何對之時佛告言佛已涅槃摩耶下來佛為不孝眾生從金棺出合掌問訊摩耶應如是答此亦名為佛臨涅槃母子相見經業報差別經說孝順恭敬父母得五種善報一少病二端正三有大威勢四生上族姓五多有資生不孝翻此五種惡報一多病二醜陋三少其威勢四生下族姓五少資生報是故在家出家皆應孝順敬愛父母二養則致其樂疏二養則致其樂者儒則怡聲下氣溫清定省等故有扇牀溫席之流釋則節量信毀分減衣鉢等故有割肉充飢之類須闍太子鈔養則致其樂者承順侍養致其父母歡樂也有過怡悅善言和顏下氣而微諫之冬溫被席夏凊扇牀夜定衾枕朝省安居故曲禮云父母有過下氣柔聲怡色以諫之若不從諫則起敬之又云凡為人子之禮冬溫而夏凊昏定而晨省東觀漢記云黃香字文強為人廉孝家無僮僕躬執侍養暑則扇牀枕冬則以身溫被席釋氏孝者僧祇律云父母不信三寶少供給之恐損父母福故若信三寶盡其所要而供給之勸發道心俱舍論說父母法師恭敬供養得無量福大報恩經說釋迦過去為王太子名須闍提爾時父王被大臣羅睺篡位欲殺王與夫人太子逃於他國錯行遠路糧盡困乏太子每日自割身肉三斤一斤奉父一斤奉母自食一斤太子肉盡方達彼國得免苦難三病則致其憂疏三病則致其憂者儒中如文帝先嘗湯藥武王不脫冠帶釋中如太子以肉為藥高僧以身而擔鈔病則致其憂者父母有病子致憂懼色無喜容心無悅意息慍怒止美食漢書云漢文帝之母薄氏太后有疾多年文帝目不交睫不解衣帶湯藥不嘗不進故禮記云君有疾飲藥臣先嘗之親有疾飲藥子先嘗之又云文王有武王不解冠帶而養文王一飯武王一飯文王再飯武王再飯旬有二日乃瘳太子以肉為藥者報恩經云六師外道謗佛不孝如來為說往昔曾作忍辱太子爾時父王身嬰重病諸臣欲求不瞋人眼睛及髓為作妙藥太子報言我似其人即呼旃陀羅斷骨出髓剜其兩目合和成藥父王服之病即除瘥高僧傳云麗朗法師母老而病以母及經論文疏各致一頭擔行不欲背之橫而擔行隨所到處傳法利人侍養不虧時人謂之橫行朗也道紀敬脫擔母之徒非一四喪則致其哀疏四喪則致其哀者儒有武丁不言子臯泣血釋有目連大呌調御舁棺於儒禮雖不同而亦哀有餘也鈔喪則致其哀者父母喪亡子盡孝心至極哀誠擗踊哭泣也論語云子張曰書云尚書高宗諒陰三年不言何謂也孔曰高宗殷之中興王名武丁也諒信也陰默也默然三年矣子曰何必高宗古之人皆然君薨百官總已以聽於冢宰三年孔曰冢宰謂天官卿佐王治者也三年喪畢然後王自聽政彼疏曰百官有事不咨於君各總己事皆自束身束己職事聽於冢宰上卿也聽從也冢太也子臯者高柴字也檀弓云高子臯執親之喪泣血三年泣而無聲如出血也未嘗見齒不言笑也調御舁棺者釋迦調御舁父母棺也淨飯王涅槃經云時淨飯王病重垂困啼泣淚下思悉達等告眾人言我命欲終恨不見難陀慶喜羅云用此為恨設使得見會雖不濟以未離生死寧不為苦諸人聞已無不涕淚佛在靈山相去五十由旬遙知王意即告阿難我曹應往令王願滿難陀白佛言王是我父所作奇特利益世間今宜往詣報養育恩阿難復言彼是我伯聽我出家為佛弟子我亦願往羅云復言彼是我祖我父棄國求道我蒙祖育方得出家今亦奉覲佛言善來即以神力踊身虗空至迦毗羅城放大光明舉國人民無不泣淚佛告眾言汝等當念生死為苦唯道是真佛放光照王患得安王知佛還一心慶悅不覺起坐頃刻佛入王舉兩手接足而言唯願如來手觸我身今者最後見佛世尊佛以其手著王額上言王是清淨戒行之人心垢已離王於臥中仰面合掌白世尊言瞻仰如來目未曾捨我願已滿遂即命終釋子號咷白㲲棺殮七寶莊嚴佛與難陀住在喪前肅恭而立阿難羅云住在喪後難陀白佛父王養我願聽擔棺阿難羅云亦爾佛念當來凶暴眾生不報父母深恩故躬自擔棺大千世界六返震動諸山涌沒如水上舡諸天釋梵夜叉鬼等皆來赴喪代佛擔棺佛即許之四王變小各共擔之佛執香爐在棺前行鷲山羅漢乘空白佛佛敕令取栴檀焚燒父王大眾號咷佛告之曰無常苦空無有堅固如幻化水月命不久居爾眾但見此火為熱諸欲更熱火滅已後收取舍利起塔供養眾請世尊說王生處佛言王生淨居天宮眾聞歡喜禮佛而退增一經云時大愛道與五百尼皆成無學聞此丘說過三月後佛入涅槃遂作念云不忍見佛入般涅槃我今宜當先取滅度即往佛所具陳上事佛默許之愛道復言我今更不見如來顏色今日遠離聖色永不再覩說是語已繞佛阿難而各七帀及諸比丘亦繞七帀退歸本寺集諸尼眾告辭入滅五百尼聞皆辭入滅佛盡許之愛道遂擊犍槌露敷坐具舉身虗空現十八變還處本座即入四禪四空處定然後入滅地六震動諸天悲泣餘五百尼皆爾佛敕耶輸提大將備辦五百牀蘇油之轝花香薪車盡皆五百供養諸尼舍利佛至尼寺告阿難難陀羅云汝等舉愛道身我自供養帝釋梵王及四天王前白佛言唯願世尊勿自勞神我自供養佛言止止如來所為非汝諸天龍等所及所以者何父母生子多有所益長養恩重乳哺懷抱我今當報姨母愛道之恩故自供養過去未來諸佛父母皆先入滅皆自供養時毗沙門敕五百王至旃檀山取於香薪燒比丘尼是時世尊自舉牀脚難陀羅云阿難各舉一脚飛在虗空往至塚間其餘四眾舉五百尼取香薪木著愛道身上佛說偈言一切行無常生者必有死不生亦不死寂滅為最樂火滅已後佛敕大將收五百尼舍利為起偷婆於長夜中受福無量問目連大呌調御舁棺儒經不說禮與俗異何故疏云顯其同耶故注釋之見母死已在於鬼中哀傷至極所以大呌釋迦調御種種供養父母遺形躬自舁棺旃檀火葬建塔供養超過俗禮哀傷至甚故云哀有餘也五祭則致其嚴二初兩宗事跡疏五祭則致其嚴者儒有薦笋之流釋有餉飯之類嚴雖有異祭意大同鈔嚴謹也極敬之謂也既安葬已追思親愛四時祭祀事死如生每於祭時齋戒沐浴明發不寐故謂之嚴孝經末云生事愛敬死事哀慼生民之本盡矣死生之義備矣孝子之事親終矣晉書云孟宗字恭武江夏安陸人也事母至孝母性復賢能訓於宗宗母好食竹笋冬月無笋宗入竹林哀號求之笋即為出因取奉母時人皆謂孝子感應所致晉時人也孝德傳說孟宗官為宗郎母性嗜笋宗每供之母亡已後冬至欲以笋祭乃入竹園哀告天地得笋薦之後為豫章太守終至司徒餉飯可知問以笋薦母以飯餉鬼二既有殊何言同耶故注釋之餓鬼思飯以飯餉之亡母好笋非笋不薦各隨性好享祭意同二重顯儒宗二初立祭所以疏但以至教未來難弘報應故先且立於祭法令敬事於神靈鈔無上佛法至極真教故名至教至教所明善因有善報惡因有惡報因果相稱名為報應至教初興在於西土未達此方人根未熟難弘因果報應之理是故孔聖隨機設教教人孝順報父母恩現存者承敬致樂亡過者哀誠致祭令敬事於父母神靈意使推尋神靈所在至教方來示其因果報應生處也二評議不可二初祖考常存疏神靈則父母之識性足顯祖考之常存二責其所失疏既形滅而神不滅豈厚形而薄神乎餘如前辨鈔既身形滅神靈不滅而常祭之豈得厚形薄神謂居致其敬養致其樂病致其憂即是貴厚其形也昊天之恩以其鬼禮而享祀之即是薄賤父母神靈也以此推徵應捨儒教權設祭禮當依釋教報應實理集福資親餘如次前孝行同異中辨今為示此存歿孝行事故而說是經二結之疏上來存歿同竟二明罪福同二初顯罪同疏次辨罪福同罪者儒則條越五刑犯當五摘而恩赦不該釋則名標七逆戒黜七遮而阿鼻定入鈔按尚書五刑起自舜代謂墨劓剕宮大辟為五也鄭氏注周禮云墨謂刻其額涅之以墨非事出入不以道義而訟者以此加之劓謂截其鼻也革輿服改制度者以此加之剕謂刖其足也決關梁踰城郭者以此加之宮謂男去其勢女閉幽室也男女不以禮義交通者以此加之大辟者今死刑也𡨥盜劫掠等者以此加之自歷夏殷二代至周公時每刑各五百合二千五百條至周穆王時召呂侯入為司𡨥增輕削重墨劓各一千剕刑五百宮刑三百大辟二百共三千條也三千條中罪之大者莫大於不孝故云條越五刑五摘者以五車繫五體縱橫裂之也三十國春秋說池陽用妻言將母於山中殺之秦王聞已令以五車裂殺也翻上五句居不致敬養不致樂等皆是不孝之罪也梵網經云七逆者出佛身血殺父殺母殺和尚殺阿闍黎破羯摩轉法輪僧殺聖人七中有一障不得戒亦名七遮遮障戒故梵語阿鼻至此云無間受苦相續無間隙故二顯福同疏福同者儒則旌於門閭上天之報釋則瑩於戒德淨土之因如觀經說當修三福一孝養父母乃至此三種業是三世諸佛淨土正因鈔旌於門閭者孝義旌表於家門鄉閭也如漢書云郭巨字文舉河內人也家貧養母嘗生一子年始三歲巨謂妻曰飢貧如此母年已高至於供母我母得其甘旨便減與我子乃令母飢子易可得母難重有今與妻以殺之以全其母妻從其言巨令妻抱子向後園中掘坑埋之掘得黃金一釜上有字曰孝子郭巨殺子全母天賜黃金一釜官不得奪人不得取巨將金詣官官有詔曰還其金表其門焉董黯等類先賢非一注觀經者彼云欲生西方淨土當修三福一孝順父母奉事師長慈心不殺修十善業二受持三歸具足眾戒不犯威儀三發菩提心深信因果讀誦大乘勸進行者此三種業是三世佛淨土正因孝順生於淨土不孝入於地獄今為示此罪福而說是經三結之疏上來總彰孝道竟四示勝田故三初標牒章門疏第四示勝田者二廣陳行相二初汎明福田復二初正顯福田又三初能喻三事疏喻如世間人欲得倉廩中五穀豐盈歲歲不乏者必須取穀麥種子以牛犁耕於田地而種之不種則竭盡也鈔五穀者粱稻菽麻麥也又楊泉物理論云粱者黍稷之總名稻者粳糯之總名菽者眾豆之總名三各二十蔬果之實助穀各二十總為五穀別為百穀二以法即喻疏法中亦爾以悲心敬心孝心為種子以衣食財帛身命為牛犁以貧病三寶父母為田地鈔貧病苦田應起悲心濟以衣食三寶德田應起敬心奉以財帛父母恩田應起孝心事以身命此三田中貧病為悲田應慜念之三寶父母合為敬田應崇奉之三種通名福田又三心中孝心為總悲敬為別梵網經云六道眾生皆是父母應孝順之彼有恩德應崇敬之彼有貧病應悲濟之貧病三寶父母三田即定悲敬孝心種子即通通三田處皆可起故衣食財帛身命牛犁亦通通三田處皆可用故三配釋行相疏有佛弟子欲得藏識中百福莊嚴生生無盡者須運悲敬孝心將衣食財帛身命給濟敬養於貧病三寶父母名為種福不種即貧窮無福慧入生死險道謂種福之田名為福田如種穀之田名穀田也鈔百福莊嚴者福行因業有其百數感莊嚴果也瑜伽五十三云於十善業各有十故謂如不殺少分多分全分少時多時盡形自作勸他讚歎慶悅是名十種十十成百也二重顯勝劣疏然種子有精新乾焦田有肥濃確瘦如悲敬孝心有懇切閑縵貧有淺深病有輕重佛有真化化有住世入滅法有大小教有權實僧有持毀父母有現生七世一一配肥瘦之田昭然可見鈔精新種子種於田中粒粒生苗皆結子實猶如三心懇切殊勝傾事三田一一生福自他俱益乾焦種子種於田中或生不生結實者少猶如三心閑縵非勝事於三田所生福利或有或無得果者少由此種福應起懇切之心傾誠給濟恭敬侍養三田田雖勝劣種須勝妙應勤修學餘文可知二正顯此經疏今盂蘭供會具三種肥田故云勝也謂佛歡喜日供養自恣淨戒大德敬田勝也報父母恩恩田勝也父母在厄難中悲田勝也三結經起意疏為欲示此勝田故說此經也第二藏乘所攝二初標牒章門疏第二藏乘所攝者二正顯收攝二初總指疏藏謂三藏乘謂五乘二別陳二初三藏收攝復二初釋三藏義亦二初正釋三藏又分三初契經藏疏三藏者一脩多羅此云契經契者契理契機經者佛地論云貫攝為義謂貫穿所應知義攝持所化生故此教於三學中詮於定學鈔脩多羅亦云脩妒路皆訛也正云素怛此云契經經通教理教能契理理能契根故名契經存體略用或單言經藏者攝持義教能攝理名契經藏二調伏藏疏二毗奈耶此云調伏調謂調練三業伏謂制伏過非此教詮於戒學鈔毗奈耶舊云毗尼毗泥皆訛也此云調伏亦調亦伏名為調伏通於教行佛所說故凡聖持故三對法藏疏三阿毗達磨此云對法法謂涅槃四諦對謂對向對觀其能對者即是妙慧此教詮於慧學鈔阿毗達磨舊云阿毗曇訛也此云對法能對是慧通漏無漏所對是法世出世間此慧對向證涅槃法復能對觀了四諦法法之對故名對法也法苑云經律論三各別部類各立一藏或無別部楞嚴經等多詮定學名契經藏文殊問經等多詮戒學名為律藏解深密經等多詮慧學名為論藏隨多所詮以分三藏二化制分別疏然經是化教開誘化導也律是制教制約行業也論則推徵解經律之意也鈔經示善惡因果之相通化在家之機名為化教律部正為制立學處制善令行制惡令斷示持犯相制出家者名為制教論正顯慧徵釋經律所顯妙理通化制教二收攝此經疏今此盂蘭盆據其名題即化教攝屬於經藏據其義意亦制教攝屬於律藏制比丘等年年自恣之日行此法故鈔此明收攝也依正不依兼此經化教契經藏攝也二五乘收攝二初釋五乘義又二初總釋疏五乘者乘以運載為名五謂人天聲聞緣覺菩薩此五力有大小載有遠近鈔五乘者涅槃云多思慮故名人雜心云意寂靜故名人俱舍云光潔自在神用名天聲聞者聲謂佛教音聲聞謂耳根發識聽受佛聲故名聲聞緣覺者以慧覺了十二因緣故名緣覺亦名獨覺於得聖身離稟至教自證無學故名獨覺菩薩者具云菩提薩埵菩提覺義薩埵有情義彼所修行略有二門一自利大智為先二利他大悲為首由此二利上求菩提下度薩埵故名菩薩又薩埵者行者自身而此行者求大菩提故名菩薩乘者運載之義體通教理行果謂依教解理依理起行依行得果行果正運教理助運四皆名乘此中人天之乘名人天乘人天二趣同有漏法根種齊故合為一也乃至菩薩之乘名菩薩乘法華等經瑜伽等論此四乘外說不定性乘謂一類機通有二乘或三乘性發心先後修習三乘通於頓漸與疏所說開合有異亦不相違二別釋五初人乘疏一人乘謂三歸五戒運載眾生越於三塗生於人道其猶小艇纔過谿澗二天乘疏二天乘謂上品十善及四禪八定運載眾生越於四洲達於上界猶如小船越小江河鈔且人趣身修於十善下品十善生於人趣中品十善非定相應生欲界天上品十善與四禪定相應生色界天與四空處定相應生無色界天四禪四空共成八定義門別故四八雙彰三聲聞四緣覺二科合二初列名指法疏三聲聞乘謂四諦法門四緣覺乘謂十二因緣法門二雙顯行相疏皆能運載眾生越於三界到有餘無餘涅槃成阿羅漢及辟支佛皆如大船越大江河鈔阿羅漢此翻云應唯識論云應已永害煩惱賊故應不復受分段身故應受世間妙供養故梵語辟支迦佛陀辟支佛略也此云獨覺亦名緣覺五菩薩疏五菩薩乘謂悲智六度法門運載眾生總超三界三乘之境至無上菩提大般涅槃之彼岸如乘舶過海也二收攝此經疏今此經者謂是人天乘所攝在小乘藏中鈔目連之母但言離苦不言生處七世父母離餓鬼苦生人天中是故此經人天乘攝今詳法非大小隨機以判隨所對機有兼有正判入五乘依正不依兼佛為目連而說此經兼化餘人聲聞乘性正是當機不被獨覺經會無故於五乘中聲聞乘攝大小乘中小乘所攝非菩薩乘經中不顯法空義故然下文云佛說經時大菩薩眾皆歡喜者聞盂蘭盆利益之相助讚小機故生歡喜也第三辨定宗旨二初標牒章門疏三辨定宗旨者二正顯宗旨二初明其宗旨復二初正明宗旨疏此經以孝順設供拔苦報恩為宗鈔宗旨者法苑云宗者崇尊主義旨者意旨旨趣此經以孝順拔苦為宗宗即是旨孝順拔苦正是此經所崇所尊所主究竟意故亦攝報恩設供由孝順故方能設會報恩拔苦故以孝順拔苦為宗旨也二以義釋成二初列二門疏今以二門分別一釋行相二配句數二隨列釋二初四義釋相復二初正釋疏初者謂目連本為孝誠欲酬恩德力所未及故先出家是以始得六通便觀三界見其亡母生餓鬼中諸得道人未必皆為父母即驗目連為欲報恩故出家也雖餉香飯旋成猛火悲號投佛佛教設於盆供拔冥途身脫一劫苦不辜生育大報劬勞鈔目連至劬勞初八句次四句次二句後二句如次釋四義也二結之疏細詳經旨備斯四義二配四四句二初總標舉數疏二配句數者有四四句二隨標顯示四初孝順相對四句疏一孝順兩字自有四句一孝而非順如三牲之養等鈔孝經云事親者居上不驕為下不亂在醜不爭醜眾也爭競也居上而驕則亡為下而亂則刑在醜而爭則兵三者不除雖日養三牲猶為不孝牛羊豕為三牲疏二順而非孝如病索禁忌之食而即供欲行非為之事而不諫等鈔孝經云父有爭子則身不陷於不義故當不義則子不可以不爭於父爭去聲呼是極諫之名父母有過子當極諫之疏三亦孝亦順謂有隱無犯三諫而隨順色觀志三年無改鈔有過隱之不聲於外不犯顏色微言諫之承順顏色觀其志節也禮記檀弓云事親有隱而無犯隱謂不稱揚其過也無犯不犯顏而諫之左右就養無方左右謂扶持之方常也子於親無如常人也服勤至死致喪三年勤謂勞辱之事也致謂慼容稱其服也此以恩為制事君有犯而無隱既諫之有人問其國政者可語得失左右就養有方不可侵官服勤至死方喪三年方喪資於事父凡此以義為制事師無犯無隱左右就養無方服勤至死心喪三年心喪慼容如父而無服也此以恩義之間為制曲禮云子之事親也三諫而不聽則號泣而隨之論語云子夏問孝子曰色難承順父母顏色乃為難也又云父在觀其志父沒觀其行三年無改於父之道可謂孝矣疏四非孝非順如水中葬父之類鈔世傳昆子恨父不仕遂葬父於昆明池中更俟檢文二孝順設供四句疏二以孝順設供相對復為四句一孝順非設供如董黯王祥等鈔漢書云董黯字孝治會稽勾章人也少亡其父養母至孝家雖貧乏母常肥悅鄰舍王寄家富母瘦寄母謂黯母曰家貧年高有何供養而常肥悅黯母曰我子孝順不為非法心不憂愁故肥悅耳問寄母曰家富美味充饒何謂羸瘦寄母曰我子不孝常為非法使我憂愁是以瘦耳而寄聞之伺黯不在遂提黯母手摑脚踏苦辱而去黯歸見母不悅問之母具說之黯曰老人多言不能自慎黯恐母憂默而不言母亡葬訖斬寄首祭母墓自縛詣官會赦得免後漢時人孝德傳云董黯後官至中郎魏志云王祥字休徵瑯琊人也餘如常談疏二設供非孝順為己求福而修齋等三俱是即盂蘭盆會四俱非謂逆而慳也三孝順拔苦四句疏三以孝順對拔苦亦為四句一孝順非拔苦謂董永等鈔漢書云董永青州於乘縣人也少失母獨養父父亡後無以葬之從人貸錢一萬謂錢主曰若無錢還以身為奴永得安葬父畢將往為奴路逢一婦人求與永為妻永曰我今貧賤身當為奴何敢屈之為妻婦人曰不恥貧賤永與同到錢主之家主曰汝妻何能妻曰織耳主曰為我織千疋絹放爾夫妻於是織之十旬千疋主人大喜放之行至本相逢處妻曰我是天之織女見君至孝天使助爾償債言訖飛空而去前漢時人疏二拔苦非孝順謂救他人之苦三俱是即蘭盆會四俱非謂逆小之人也四孝順報恩四句疏四以孝順對報恩亦為四句一孝順非報恩護髮膚不驕危非法不言等鈔孝經云非先王之法言不敢道非先王之德行不敢行疏二報恩非孝順扶輪報一餐修行報施主等三俱是盂蘭盆會也四俱非謂辜恩逆人鈔扶輪者類林云靈輒齊人也晉大夫趙盾出遊於桑下見一餓人傾壺飼之問曰君何人餓者曰我齊人姓靈名輒遊學三年今歸糧盡不能前進盾更遺食後事靈公為守門者盾直諫公公欲殺之盾遂起復呼獒咬盾盾走登車車已去其一輪靈輒乃扶輪而去盾既免難問曰何人也曰我桑下餓人也春秋傳第十說靈輒為晉靈公之介甲士倒戈禦靈公之徒不言扶輪然疏以四行作四四句內有無用之句今詳四行總為十五句分為四類第一類者隨修一行有四句可知第二類者二二合修有六句一孝順設供二孝順拔苦三孝順報恩四設供拔苦五設供報恩六拔苦報恩第三類者三三合修有四句一一闕之可知第四類者四行全修總為一句如是總計一十五句義類差別皆是此經所宗義也二歎其勝妙疏今修此一門即圓四行所得功德何可校量寔由境勝心彊徹於神理故也鈔盆會一門即能圓於孝順等四行三種肥田名為境勝悲敬孝順三類種子名為心彊徹者通也由此境勝心彊通顯四行神功妙理故以為宗疏鈔音釋疏釁許慎切罪也衣錦上去聲食稻上如字又音寺犧牲音希生純色牛完全徇徐閏切求也蘋蘩音頻煩養則上去聲供也舁音余共舉也餉式亮切饋也黜音出貶下艇音挺小船舶音白大船旋成上旬宣切速疾黯乙減切鈔繭古典切蠶衣也懣母本切穹窿下音隆天勢高升也旁礴音滂薄地勢混同也援神契上音袁引也漢儒解孝經施之上音𦂛布設也放諸上音倣至也下諸之也斷一樹上音短截也居處下音杵安止也莅音利臨也色養下去聲供也下敬養侍養倣此凊七性切寒也𪫟惕音出剔恐而肅敬之也會稽音檜雞越郡名簠簋音甫軌祭器居然上音基語助也衾音欽大被也祧音挑遷廟墠音善除地適士上音的上士也即今之正卿中士今之朝官下士今之京官也不爭下去聲伋音急子思名踵音腫足跟也柞楢音昨由柔木也圜丘上音員天體也侑坐上音右對坐也數月上音所計也計其月不出瘳音抽疾瘥也饒儲下音除具也即豐備矣偯音矣哭餘聲也縗音崔喪服絰徒結切麻帶也齊衰音資崔散齋上去聲呼舒緩也去祭遠故礿禘音藥弟毅音義愔伊金切列子列者人姓也禪位上音善讓位也欲去下上聲除也告朔上音谷告上也餼音戲牲生也朝享上音潮早也秩蒭音姪初東觀下音貫漢時於宮前造東西兩觀今之史館也篡初思切奪也冠帶上音貫剜烏丸切削取也敬脫下音奪道紀敬脫二皆高僧亦擔母侍養傳法者諒陰下平聲然也不言國政薨呼弘切君亡見齒上音現露也涕淚上音體泣也犍槌上巨寒切下音弟此集眾作相之具鐘鼓總名偷婆訛略梵語若具應云窣覩波此云高顯處劓剕音義費大辟下音闢法也謂節制其罪即大罪也池陽人名刖音月絕也掠音略奪取爭子上去聲止也下爭父同侵官各有司職不可相侵方喪方類也資於事父者資取也謂君崩比取事父矣世傳下平聲謂非經史所載趙盾下音沌獒音敖犬高四尺
